            { id: 3, text: "弄堂月光像馊掉的牛奶。旗袍盘扣勒紧喉咙。你发现一串虱子正从丝绸里爬向后颈，你会？", origin: "张爱玲《金锁记》", desc: "海派文学典型的苍凉视觉。在精致与腐朽的缝隙里观察人性的扭曲与自私。", reading: "《金锁记》、《半生缘》", options: [
                { text: "点燃半截纸烟：这华丽，本质就是一滩烂泥。", target: "张爱玲" },
                { text: "撕开扣子。这弄堂是细密的网，我要跑向远方。", target: "三毛" },
                { text: "取下剪刀。想把这层发霉的、虚伪的文明剪碎。", target: "鲁迅" },
                { text: "闭眼构思大观园。那里至少曾有过洁白的雪。", target: "曹雪芹" }
            ]},
            { id: 4, text: "园墙塌了一半。双腿失去知觉。周围只有落叶在水泥地上摩擦的沙沙声，你会？", origin: "史铁生《我与地坛》", desc: "残缺与永恒的对谈。在荒废的园子里寻找生命的坐标，完成了对死亡的和解。", reading: "《我与地坛》、《病隙碎笔》", options: [
                { text: "承认残缺。在这片废墟上思考自我的精确坐标。", target: "史铁生" },
                { text: "盯着年轮。解析这套超越个人肉身的智性逻辑。", target: "王小波" },
                { text: "将这凄冷化作挽歌。文字是泥土里颤动的洛神。", target: "萧红" },
                { text: "守望温存。在严寒降临前，为后来者留下一盏灯。", target: "迟子建" }
            ]},
            { id: 5, text: "锦绣满地。当所有人都在推杯换盏，你嗅到了繁华即将崩塌的土腥味，你会？", origin: "曹雪芹《红楼梦》", desc: "盛极而衰的幻灭美学。在极致的繁华里看到极致的荒凉，写就文明的祭奠。", reading: "《红楼梦》", options: [
                { text: "陪祭这场幻梦。用极致的美守护这注定毁灭的最后一秒。", target: "曹雪芹" },
                { text: "在弄堂缝隙里，做一个理性的、有耐心的缝补者。", target: "王安忆" },
                { text: "钻进潜意识。切断所有出口，独自实验那场噩梦。", target: "残雪" },
                { text: "背起行囊走入沙漠。拒绝当任何繁华的殉葬品。", target: "三毛" }
            ]},
            { id: 6, text: "污水淹没了书架。书页泡涨发臭。水淹过膝盖，你手里攥着断了尖的钢笔，你会？", origin: "钱钟书 智性博弈", desc: "当文明遭受生理性的磨损时，清醒者应保持嘲弄还是守望？", reading: "《围城》、《写在人生边上》", options: [
                { text: "写在心口。那是任何洪水也无法格式化的人格代码。", target: "杨绛" },
                { text: "写下高级嘲弄。计算智性在这场覆灭中的概率。", target: "钱钟书" },
                { text: "看着书页化作浮萍。觉得这覆灭里有神圣规律。", target: "沈从文" },
                { text: "诅咒洪涝。在石头上刻下对某种权力的质问。", target: "鲁迅" }
            ]},
            { id: 7, text: "火堆快熄了。暴雪足以在十秒内冻结血液。手稿是这里唯一的燃料，你会？", origin: "迟子建 原始生存", desc: "描写了在自然严寒面前，生命对文明与温存的最后守望。", reading: "《额尔古纳河右岸》", options: [
                { text: "扔进火中。为了活着而忍受痛苦，是唯一的道义。", target: "余华" },
                { text: "任由火灭。在黑暗中计算冰点降临的精确秒数。", target: "王小波" },
                { text: "走出帐篷。在自然的壮丽中完成最后的自我交付。", target: "迟子建" },
                { text: "在墙根刻下名字。通过记录对抗彻底的遗忘。", target: "萧红" }
            ]},
            { id: 8, text: "路边有人分发抹除记忆的蓝色药丸。吞下它将获得平庸的快乐，你会？", origin: "批判哲学博弈", desc: "关于“痛苦真实”与“平庸幸福”的博弈。是认领伤口还是拥抱麻木？", reading: "《野草·希望》", options: [
                { text: "踩碎它。痛苦是确认我这个“主体”存在的唯一铁证。", target: "鲁迅" },
                { text: "留着它。作为解构这种廉价安慰的智性样本。", target: "钱钟书" },
                { text: "喝一半。过滤脏污，留下关于美的局部档案。", target: "林徽因" },
                { text: "推开它。我只要自由的风，不要任何确定性。", target: "王小波" }
            ]},
            { id: 9, text: "假如有一件文学法器。最契合你指尖触感的是？", origin: "原创文学意象", desc: "通过器物的质感区分不同人格的攻击力与守御性。", reading: "《中国文学史纲要》", options: [
                { text: "一把能在深夜剖开伪善、散发冷光的解剖刀。", target: "鲁迅" },
                { text: "一架观测星体、具有精密逻辑推导能力的望远镜。", target: "钱钟书" },
                { text: "一个装满晚霞、能洗净铅华的旧墨水瓶。", target: "杨绛" },
                { text: "一张通向异乡、沾满风暴灰尘的远行地图。", target: "三毛" }
            ]},
            { id: 10, text: "如果必须为对手设计最终宿命。你会选择？", origin: "原创叙事博弈", desc: "通过你对“异己”的处置，识别你灵魂里的宽容度与反抗性。", reading: "《生死疲劳》", options: [
                { text: "赋予他更坚定的反抗精神。甚至反过来审判我。", target: "鲁迅" },
                { text: "让他陷入智力怪圈。在无穷的尴尬中自我消解。", target: "钱钟书" },
                { text: "让他消失在漫天大雪。让一切在自然里彻底洁白。", target: "曹雪芹" },
                { text: "让他去流浪。在不停的跋涉中发明自己的姓名。", target: "三毛" }
            ]},
            { id: 11, text: "假如时间实体化为纸张。你会如何处理？", origin: "王安忆 城市肌理", desc: "是编织琐碎的肌理，还是刻下对抗遗忘的痕迹？", reading: "《长恨歌》", options: [
                { text: "编织成庞大的网。网住弄堂里所有琐碎瞬间。", target: "王安忆" },
                { text: "刻下见骨划痕。记录对抗遗忘的所有真实伤疤。", target: "余华" },
                { text: "涂上透明彩墨。构建一种虚幻的、半透明的厚度。", target: "残雪" },
                { text: "剪成纸屑。随风飘向空白处，永不试图保留。", target: "萧红" }
            ]},
            { id: 12, text: "看到关于“真理”的小册子。你最本能的反应是？", origin: "王小波 智性姿态", desc: "对待宏大叙事的态度。是冷嘲、解构还是安静的收藏？", reading: "《沉默的大多数》", options: [
                { text: "冷笑。在这个时代，真理往往是谎言的高级形式。", target: "老舍" },
                { text: "拆解。寻找逻辑不自洽的漏洞，作为有趣笑料。", target: "王小波" },
                { text: "无视。真理不在纸上，在流水和爱人的眼底。", target: "沈从文" },
                { text: "收藏。作为一段微观历史，安静放进收藏柜。", target: "杨绛" }
            ]},
            { id: 13, text: "叙事中的长久沉默。你认为这种“留白”的物理质感是？", origin: "林徽因 诗意留白", desc: "对生命无法承载之重的审美处理。沉默的意义往往大于言说。", reading: "《你是人间的四月天》", options: [
                { text: "加密电报。等待理性的解码与因果的揭秘。", target: "丁玲" },
                { text: "深渊边的屏息。预示英雄坠落前最后的悲歌。", target: "史铁生" },
                { text: "即将引爆的炸弹。沉默是为了更猛烈的反叛。", target: "莫言" },
                { text: "爱人的叹息。语言无法承载的、极度纯粹的感性。", target: "林徽因" }
            ]},
            { id: 14, text: "被囚地牢。在腐烂前，你会在墙上留下？", origin: "萧红 生死场氛围", desc: "极端匮乏下的生命印记。关于坐标、诅咒、审美或是自由的证据。", reading: "《生死场》", options: [
                { text: "一串坐标。指引后来者找到真相的秘密暗道。", target: "王安忆" },
                { text: "一句诅咒。哪怕肉身化土，意志也要化作厉鬼。", target: "丁玲" },
                { text: "一朵正凋零的玫瑰。守护最后的高贵审美。", target: "林徽因" },
                { text: "一串脚印。“此地不留行”，我从未被真正锁住。", target: "舒婷" }
            ]},
            { id: 15, text: "主角面临毫无意义的牺牲。你会赋予他什么样的状态？", origin: "莫言 残酷写实", desc: "对生命尊严的最终定义。是野蛮的活着，还是神性的庄严？", reading: "《丰乳肥臀》", options: [
                { text: "野蛮生命力。为了“活着”硬生生扛下所有屈辱。", target: "余华" },
                { text: "智性优越感。在荒谬处境中寻找有趣逻辑的戏谑。", target: "金庸" },
                { text: "人格尊严。在平凡琐屑中突然捕捉到的神性。", target: "老舍" },
                { text: "绝望对抗。最终化为荒原上的一抹血色幻象。", target: "莫言" }
            ]},
            { id: 16, text: "路边有人为了生存屈辱鞠躬。在你目光交汇的一瞬，你会？", origin: "老舍 阶层叙事", desc: "是对系统的愤怒，还是对“活着”本身的感喟？", reading: "《骆驼祥子》", options: [
                { text: "愤怒。认为这个吃人的系统应当被彻底砸烂。", target: "丁玲" },
                { text: "感喟。这弯曲的脊梁是“活着”的庄严隐喻。", target: "余华" },
                { text: "避开目光。粗糙现实会刺伤我构建的审美秩序。", target: "林徽因" },
                { text: "观察。分析这出世俗悲剧背后的复杂权利博弈。", target: "王安忆" }
            ]},
            { id: 17, text: "胜利的消息传来了。人群狂欢。你的生理反应倾向于哪一种？", origin: "张爱玲 疏离叙事", desc: "是对虚无的敏锐洞察，还是对代价的沉重纪念？", reading: "《小团圆》", options: [
                { text: "寒意。由于洞察了胜利背后更深层的虚无感。", target: "张爱玲" },
                { text: "神圣感。由于这场胜利必须支付的血腥代价。", target: "丁玲" },
                { text: "快慰。由于那套陈旧的压迫秩序终于崩坏了。", target: "金庸" },
                { text: "宁静。由于终于达成了一次智性的逻辑闭环。", target: "杨绛" }
            ]},
            { id: 18, text: "假如文字有声音。你希望书稿发出的声音是？", origin: "原创通灵叙事", desc: "语言质感的听觉转换。铁锤、空谷、针脚还是风啸？", reading: "《呼兰河传》", options: [
                { text: "铁锤重击铁砧。每一声都带有震碎麻木的力量。", target: "老舍" },
                { text: "空谷足音。孤独、清远，不求任何人的回响。", target: "史铁生" },
                { text: "弄堂细密的针脚走线声。琐碎中见大千世界。", target: "王安忆" },
                { text: "大风刮过沙漠的啸叫。自由得让人感到不适。", target: "舒婷" }
            ]},
            { id: 19, text: "关于“围城”。城里人想冲出去，城外人想进来，你会？", origin: "钱钟书 结构荒谬", desc: "描述了人类在欲望与幻灭之间的永久性错位。", reading: "《围城》", options: [
                { text: "站在斑驳城墙上冷笑。看穿这结构性的尴尬。", target: "张爱玲" },
                { text: "用一辈子拆墙。哪怕后面是深渊也要打破牢笼。", target: "莫言" },
                { text: "在城门边种木棉。让无奈变得具有独立姿态。", target: "舒婷" },
                { text: "不进也不出。我在城外的荒原流浪到天黑。", target: "萧红" }
            ]},
            { id: 20, text: "设计一个注定失败的结局。你会让他临终前？", origin: "金庸 武侠悲情", desc: "是正面迎接毁灭，还是消失在漫天大雾中？", reading: "《天龙八部》", options: [
                { text: "正面迎接毁灭。在绝望灰烬中确立主体尊严。", target: "余华" },
                { text: "消失在漫天大雾。留下绝美且无法弥补的遗憾。", target: "曹雪芹" },
                { text: "精准解析。让失败成为一堂关于智力局限的课。", target: "莫言" },
                { text: "冷笑。用戏谑解构这整场荒唐的命运剧本。", target: "金庸" }
            ]},
            { id: 21, text: "整个图书馆着火。你只能抢救出一页纸，你会选择？", origin: "核心价值筛选", desc: "是温润的家书、严密的公式还是战斗的火种？", reading: "《我们仨》", options: [
                { text: "一张沾满亲人眼泪、记录家庭温度的旧信。", target: "杨绛" },
                { text: "一张写满逻辑公式、确保智性不灭的数据纸。", target: "莫言" },
                { text: "一张刻满反叛斗争史、能点燃下一次的火种页。", target: "丁玲" },
                { text: "一张白纸。在废墟上我们需要重新认领姓名。", target: "残雪" }
            ]},
            { id: 22, text: "面对厚重如山的规矩。你最本能的反应是？", origin: "传统文明重压", desc: "是负重前行、拆解利用还是付之一炬？", reading: "《四世同堂》", options: [
                { text: "背负。在艰难行走中完成古典守望与传承。", target: "老舍" },
                { text: "拆解。将腐烂符号转化为现代叙事的砖石。", target: "金庸" },
                { text: "烧毁。只有在焦土之上自由才有广阔操场。", target: "残雪" },
                { text: "粉饰。在词藻里重构一个从未存在的极美盛世。", target: "林徽因" }
            ]},
            { id: 23, text: "关于“爱”。你的第一直觉倾向于哪一种定义？", origin: "舒婷 独立木棉", desc: "情感逻辑的底层架构。是交换温度的契约，还是独立平衡的木棉？", reading: "《致橡树》", options: [
                { text: "两团火苗在冬夜交换温度的契约。", target: "迟子建" },
                { text: "作为树的形象和你站在一起，平视且独立。", target: "舒婷" },
                { text: "华丽袍子下的博弈，本质是自私者的收留。", target: "张爱玲" },
                { text: "让受压迫灵魂瞬间觉醒、产生反抗的力量。", target: "杨绛" }
            ]},
            { id: 24, text: "镜子里突然看到陌生人的脸。你会做什么？", origin: "残雪 自我异化", desc: "在潜意识的房间里，识别出那个被你亲手杀死的影子。", reading: "《黄泥街》", options: [
                { text: "尖叫。那是潜意识里被我杀死的另一个自我。", target: "残雪" },
                { text: "逼视。我想知道这个灵魂是否也有不妥协的风骨。", target: "萧红" },
                { text: "淡定。也许这只是宇宙折叠产生的美丽差错。", target: "沈从文" },
                { text: "涂抹。用胭脂去覆盖，直到镜面变回熟悉的平庸。", target: "张爱玲" }
            ]},
            { id: 25, text: "整个文字世界坍塌。只允许保留一个词。你会留下哪一个？", origin: "语言哲学逻辑", desc: "存在意义的最后底线。代表了反转、理性、留白还是未来？", reading: "《写在人生边上》", options: [
                { text: "“但是” —— 代表永远的转折与不服从。", target: "金庸" },
                { text: "“因为” —— 守住因果底线，确保理性。", target: "沈从文" },
                { text: "“也许” —— 在朦胧中保留余地，不致刺眼。", target: "萧红" },
                { text: "“再会” —— 预示下一场迁徙，灵魂在路上。", target: "迟子建" }
            ]},
            { id: 26, text: "文学里的“风景”应当是哪种物理状态？", origin: "审美意象转换", desc: "精神疆域的视觉化。是荒原、森林、江南还是雪原？", reading: "《额尔古纳河右岸》", options: [
                { text: "布满荆棘的荒原。试炼英雄骨骼的战道。", target: "余华" },
                { text: "迷雾森林。通往潜意识噩梦的隐喻线索。", target: "残雪" },
                { text: "半梦半醒的江南。逃离现实的温润避难所。", target: "曹雪芹" },
                { text: "极北雪原。守望最后一点人性的善良。", target: "迟子建" }
            ]},
            { id: 27, text: "最后，如果你可以掌握一种虚构的力量，你会选择？", origin: "虚构功能本质", desc: "文学职能的终极赋予。是提炼苦难、修补现实还是建立引力？", reading: "《生死疲劳》", options: [
                { text: "将苦难提炼成黄金。让被侮辱者获得加冕。", target: "萧红" },
                { text: "在裂缝中挖深井。修补那破碎苍凉的现实。", target: "王安忆" },
                { text: "在空白处发明引力。让混乱逻辑重新归位。", target: "曹雪芹" },
                { text: "将世界缩减成书柜。而我拥有唯一的钥匙。", target: "老舍" }
            ]},
            { id: 28, text: "面对一个毫无意义、却被盲目崇拜的纪念碑，你会？", origin: "原创精神实验", desc: "是对智性拆解、生命颠覆还是无视？", reading: "《黄金时代》", options: [
                { text: "写满注脚。用智性拆解它荒谬的地基。", target: "王小波" },

                        h('div', { className: "pt-8 space-y-4 text-center px-4" },
                            h('button', { onClick: saveAsImage, disabled: isSaving, className: "w-full py-6 bg-black text-white text-[11px] font-bold uppercase tracking-[0.6em] shadow-2xl active:scale-95 transition-all rounded-2xl" }, isSaving ? "正在生成中..." : "保存手稿报告 / SAVE REPORT"),
                            h('button', { onClick: handleRestart, className: "w-full py-6 border border-[#3a3833] text-[#3a3833] text-[11px] font-bold uppercase tracking-[0.6em] hover:bg-[#3a3833] hover:text-white transition-all rounded-2xl" },
                                h('span', null, " 再次校准原型")
                            )
                        )
                    ),
                    h('footer', { className: "mt-16 pt-16 border-t border-[#dcd8cf] text-center space-y-4" },
                        h('p', { className: "text-[10px] tracking-[0.6em] uppercase text-[#3a3833] font-bold opacity-60" }, "© 2026 CURATED BY @云树CLOUDTREE")
                    )
                );
            }
            return null;
        }

        window.addEventListener('DOMContentLoaded', () => {
            try {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(h(App));
            } catch (err) {
                console.error("Render failed:", err);
                document.body.innerHTML = '<div style="padding:40px; text-align:center; font-family:sans-serif;">系统初始化失败，请尝试刷新页面。</div>';
            }
        });
    </script>
</body>
</html>
