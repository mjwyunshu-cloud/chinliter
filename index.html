<!DOCTYPE html>

    <script src="https://fastly.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>

    <style>
        :root { --bg-color: #f2f0e9; --text-main: #3a3833; }
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            margin: 0;
            overflow-x: hidden;
        }
        #loading-screen {
            position: fixed; inset: 0; background: #f2f0e9; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 2px solid #3a383322; border-top-color: #3a3833; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .highlight-yellow { background: linear-gradient(180deg, rgba(255,255,255,0) 65%, #e8ed2a 65%); padding: 0 4px; }
        .redeem-input { background: transparent; border: none; border-bottom: 1.5px solid #3a3833; outline: none; text-align: center; letter-spacing: 0.2em; }
        .redeem-input:focus { border-bottom: 2px solid #35afcb; }

        .context-box { background: #eeede6; border-left: 3px solid #3a383322; padding: 20px; margin-bottom: 30px; }
        .tag-black { background: #3a3833; color: #f2f0e9; padding: 2px 8px; font-size: 10px; font-weight: bold; letter-spacing: 0.1em; }
        .tag-outline { border: 0.5px solid #3a383344; padding: 2px 8px; font-size: 10px; opacity: 0.5; }
        
        .option-btn { background: white; border: 0.5px solid #dcd8cf; padding: 20px; transition: all 0.2s; text-align: left; margin-bottom: 12px; display: block; width: 100%; border-radius: 2px; }
        .option-btn:hover { border-color: #3a3833; background: #fafaf9; }
        .option-btn:active { background: #eeede6; }

        .abstract-node { transition: all 0.3s ease; cursor: pointer; }
        .abstract-node:hover { transform: scale(1.1); }
        .shake-ani { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-size: 10px; letter-spacing: 0.3em; opacity: 0.5;">正在提取灵魂手稿...</p>

    <script>
        const { useState, useEffect, useRef, createElement: h } = React;

        const WRITER_DATA = {
            "鲁迅": { theme: "#b91c1c", secondary: "#1a1a1a", sub: "拒绝麻木的审视者", stats: [98, 70, 40, 60, 95], identity: "你对平庸的妥协持有生理性的敌意。相比于模糊的幸福，你更尊重清醒的痛感。", bio: "他解剖民族潜意识，撕开伪善温情，在绝望中确立清醒者的尊严。", motif: "绝望的反抗：在困局中，由于洞察真相而不得不发出的呐喊。", echo: "你是那个能一眼识破话术泡沫的人，无法融入廉价的乐观。", anxiety: "害怕由于大众的麻木而导致坚持的真理变成一场噪音。", shadow: "极度的批判主义可能演化为对他人的精神剥削。", longDesc: "你的人生是持续的自我献祭。你拒绝任何安抚，认为只有痛感才是确认生命主体性的证据。", quote: "横眉冷对千夫指，俯首甘为孺子牛。", books: [{title: "《野草》", author: "鲁迅", desc: "在死火与焦土上的自我拉扯。"}] },
            "张爱玲": { theme: "#4338ca", secondary: "#1e1b4b", sub: "华丽废墟的守望者", stats: [50, 95, 85, 45, 65], identity: "你在极度琐碎里发现了命运的不可抗力。你迷恋精致，但更洞穿精致背后的腐朽。", bio: "专攻人性深处的自私与尴尬，在华丽中捕捉腐朽，将世俗悲剧推向极致。", motif: "文明荒原：在时代废墟折痕里，捕捉一抹带有霉味的精致感。", echo: "你是那个在热闹聚会中突然感到一阵寒意的人。", anxiety: "害怕平庸生活消磨掉最后一丝灵气。", shadow: "过度的清醒导致了对他人的极度疏离。", longDesc: "你有一双洞穿繁华的冷眼。你记录那些在欲望博弈中逐渐枯萎的灵魂。你认为真实即是苍凉。", quote: "生命是一袭华丽的袍，爬满了蚤子。", books: [{title: "《传奇》", author: "张爱玲", desc: "旧梦折痕里最真实的人性博弈。"}] },
            "钱钟书": { theme: "#0f766e", secondary: "#134e4a", sub: "围城外的智性审视者", stats: [65, 98, 55, 85, 50], identity: "你追求绝对智性。你用嘲弄作为防御，对抗这个世界的愚昧。", bio: "博通中外的视野俯视众生。对人类欲望驱使下的尴尬表演给予了最刻薄的注脚。", motif: "围城的逻辑：人类所有的选择都是基于对他者的误解。", echo: "你是朋友圈里那个最不屑于‘矫情’的人。", anxiety: "害怕由于过于博学陷入书斋困局，无法行动。", shadow: "智性的快感掩盖了对生命真实温度的感知。", longDesc: "你享受智力的博弈。文学是充满反讽的游乐场。你在荒诞的人间建立起一套逻辑避难所。", quote: "城外的人想冲进去，城里人想出来。", books: [{title: "《围城》", author: "钱钟书", desc: "现代人精神尴尬与结构性困局的启示录。"}] },
            "沈从文": { theme: "#0891b2", secondary: "#164e63", sub: "流水与人性的纪录者", stats: [40, 60, 95, 80, 55], identity: "你在物质文明的噪音中礼赞原始人性。你坚信自然的法则高于社会的逻辑。", bio: "来自湘西的文学赤子。礼赞原始生命力的纯粹与哀伤。", motif: "自然的秩序：流水带走野花，藏着宇宙最丰饶的真相。", echo: "在内卷时代，你是那个向往‘归园田居’的人。", anxiety: "害怕现代文明粉碎人性最后温润的角落。", shadow: "过度的自然主义可能导致被动逃避。", longDesc: "你迷恋自然的纯粹。文学应是对情感自然的敬畏与描摹。你眼中的人带着土地的神性。", quote: "我爱过一个正当最好年龄的人。", books: [{title: "《边城》", author: "沈从文", desc: "寻找未被污染的灵魂。"}] },
            "王小波": { theme: "#1d4ed8", secondary: "#1e3a8a", sub: "智性趣味的自由者", stats: [85, 98, 70, 95, 60], identity: "你用逻辑消解一切‘崇高’。在你看来，‘有趣’是作为一个独立个体最重要的防御。", bio: "文坛最独特的自由主义者。将诗意与逻辑完美融合，智慧本身就是一种美德。", motif: "诗性的理智：用幽默作为武器去戏谑那些自命不凡的平庸。", echo: "你是那个拒绝被任何‘权力教条’洗脑的人。", anxiety: "害怕由于群体的集体愚昧而丧失个人精神的自主性。", shadow: "智性的优越感有时会演变为冷嘲。", longDesc: "你拒绝被宏大词汇绑架。你在荒谬中保持着诚实的幽默感，在无趣世界开辟自由操场。", quote: "一辈子很长，要找个有趣的人在一起。", books: [{title: "《黄金时代》", author: "王小波", desc: "用理性对抗整个时代的荒诞。"}] },
            "史铁生": { theme: "#4b5563", secondary: "#111827", sub: "生命局限的静思者", stats: [75, 90, 65, 50, 98], identity: "你在废墟上思考生存。你承认肉身的局限，但你通过思想完成了对宿命的突围。", bio: "他在地坛的残垣断壁间完成了对存在意义的终极追问。", motif: "宿命的和解：在必然局限中，创造出宽广的精神空间。", echo: "面对人生低谷，你具有深沉的耐性，不是忍受，是参透。", anxiety: "害怕环境的长期禁锢，丧失了与外部宇宙的连接。", shadow: "深度的哲思使你显得与当下快节奏生活格格不入。", longDesc: "你承认人生的荒芜。你与死亡达成默契，获得了生的宁静。文学是对生命意义的救赎。", quote: "死是一个必然会降临的节日。", books: [{title: "《我与地坛》", author: "史铁生", desc: "关于生存、残缺与永恒的终极对谈。"}] },
            "萧红": { theme: "#7c3aed", secondary: "#4c1d95", sub: "漂泊灵性的捕捉者", stats: [70, 45, 90, 98, 75], identity: "你有野生的直觉。你的灵魂是一场永不停歇的迁徙。", bio: "文字是对阵痛最敏锐的捕捉。生命粗砺如泥，却透着神辉。", motif: "生死场上的颤动：野性是文学的本质。", echo: "在安稳生活中，你总感到莫名的无家可归感。", anxiety: "害怕定居丧失灵魂中最宝贵的野生感。", shadow: "极度漂泊感使人生在现实层面无法落脚。", longDesc: "你在荒凉岁月里赤脚行走。生命是无终点的迁徙。你的文字充满了原始战栗感。", quote: "那是呼兰河传，那是我的小城故事。", books: [{title: "《呼兰河传》", author: "萧红", desc: "勾勒人类生灭的原始长卷。"}] },
            "曹雪芹": { theme: "#ca8a04", secondary: "#713f12", sub: "大观园的织梦人", stats: [40, 80, 98, 45, 90], identity: "你洞穿了万物覆灭，依然沉醉于记录那一抹华丽。你是美的最后陪葬者。", bio: "在幻梦中预演了文明的整体覆灭，将生命美学总结至终极高度。", motif: "美的悼词：质本洁来还洁去。美必然与幻灭共生。", echo: "你极其注重生活仪式感，不屑于权力的争夺。", anxiety: "害怕心中那块‘洁白’被俗世的欲望彻底染成肮脏。", shadow: "透彻宿命感导致现实中缺乏进取心。", longDesc: "你在字里行间构建幻梦。你坚信美是荒唐世界唯一的救赎。你试图挽留注定逝去的余晖。", quote: "质本洁来还洁去，强于污淖陷渠沟。", books: [{title: "《红楼梦》", author: "曹雪芹", desc: "东方文明的美学终结与生命祭奠。"}] },
            "杨绛": { theme: "#166534", secondary: "#064e3b", sub: "洗净铅华的观察家", stats: [35, 92, 45, 55, 90], identity: "你在平淡中见真意。力量源于内心的安静。忍受也是智慧。", bio: "文坛最宁静的声音。经历世纪波澜，用洁白笔触记录情感。", motif: "守望灯火：在喧嚣边缘守住书卷，是对时代最温柔的反抗。", echo: "你是不需要社交填补空虚的人，有一种隐入烟尘的高级感。", anxiety: "害怕外部喧嚣破坏内心的专注。", shadow: "过度的克制让你显得对冲突缺乏热量。", longDesc: "经历动荡选择克制。文字是记录温度的日记。你在平庸现实上建立了花园。", quote: "我们仨，就剩下我一个了。", books: [{title: "《我们仨》", author: "杨绛", desc: "极简文字下涌动的深情。"}] },
            "余华": { theme: "#1e293b", secondary: "#020617", sub: "苦难底色的生存者", stats: [75, 85, 50, 60, 98], identity: "你剥离了廉价感伤。在极端苦难前，人唯一的尊严就是忍受。活着是庄严的大山。", bio: "揭示生命本能——忍受。在他笔下，活着不再是动词。", motif: "生存即道义：为了活着本身而活着。", echo: "在不确定环境中，你表现出惊人韧性，极其务实。", anxiety: "害怕生存匮乏导致人丧失基本属性，变得麻木。", shadow: "冷静到近乎麻木的视角让你显得冷酷。", longDesc: "你用冰冷笔触书写极端痛感。关注生存本能。你是时代的见证者。", quote: "活着，活着本身就是唯一的理由。", books: [{title: "《活着》", author: "余华", desc: "生存意志的最强音。"}] },
            "莫言": { theme: "#991b1b", secondary: "#450a0a", sub: "民间幻象的通灵者", stats: [85, 55, 95, 65, 80], identity: "你将民间粗砺升华为绚烂幻觉。你相信土地下藏着原始欲望。", bio: "民间荒诞编织成宏大魔幻现实，挖掘民族元神。", motif: "轮回的幻象：权力叙事下，大地的欲望才是永恒。", echo: "你想象力极丰，对规矩感到压抑，喜欢在直觉世界横冲直撞。", anxiety: "害怕原始生命力被现代逻辑彻底格式化。", shadow: "血腥与狂想的交织使表达感官过载。", longDesc: "你的叙事带有野性。通过重构民族苦难叙事，建立起一座通往潜意识深处的地下迷宫。", quote: "生死疲劳，从荒原到幻象。", books: [{title: "《生死疲劳》", author: "莫言", desc: "东方魔幻现实主义巅峰。"}] },
            "周作人": { theme: "#65a30d", secondary: "#365314", sub: "闲适草木的智性家", stats: [60, 95, 85, 70, 50], identity: "你在草木虫鱼中构筑智性的避风港。你追求一种具有文明高度的闲适。", bio: "以平和冲淡的笔触探讨生活艺术，主张在智性废墟上建立宁静的日常。", motif: "日常的艺术：在琐碎中保持独立的人格与清醒。", echo: "你是朋友圈里那个最能发现‘无用之美’的人。", anxiety: "害怕外部狂热打碎精致脆弱的个人秩序。", shadow: "过度的闲适可能演变为对阵痛的逃避。", longDesc: "你追求精神的自足与物理的安静。你认为清醒地活着，就是对荒诞时代最好的回击。", quote: "我们于日用必需的东西以外，必须还有一点无用的游戏与享乐。", books: [{title: "《雨天的书》", author: "周作人", desc: "在冲淡文字中领略真意。"}] },
            "汪曾祺": { theme: "#f59e0b", secondary: "#92400e", sub: "烟火人间的赤子", stats: [30, 70, 95, 80, 85], identity: "你在咸鸭蛋与草木间认领生活。你坚信美藏在最平凡的烟火气里。", bio: "笔触淡而有味，将俗世日常升华为极具诗意的文学景观。", motif: "生活的回甘：人间至味是清欢。", echo: "你是那个能把简单的三餐吃出仪式感的人。", anxiety: "害怕传统的温情被现代快节奏彻底抹杀。", shadow: "过度的通透在严肃博弈面前显得过于散淡。", longDesc: "你用文字缝补生活的裂缝。你让平凡的事物散发出神性的光辉。", quote: "人不管走到哪一步，总得找点乐子。", books: [{title: "《人间草木》", author: "汪曾祺", desc: "烟火里的文学诗篇。"}] },
            "丁玲": { theme: "#15803d", secondary: "#064e3b", sub: "时代激荡的抉择者", stats: [92, 65, 55, 50, 95], identity: "你敢于在冲突中直面真实的自我，在历史阵痛中不断进化。", bio: "表现强韧主体性，拒绝被既定角色吞没，投身于宏大进程。", motif: "信念的韧度：自我解放是投身正义的起点。", echo: "你是那种具有极强存在感的人，哪怕争议再大也要走选中的路。", anxiety: "害怕过于关注‘小我’而丧失了对时代参与感。", shadow: "投身时代的狂热掩盖了个体真实。", longDesc: "你是投身的火，灼烧的铁。展现极强韧生命张力。", quote: "人，只要有一种信念，有所追求，就能忍受。", books: [{title: "《太阳照在桑干河上》", author: "丁玲", desc: "个体阵痛与信仰重生。"}] },
            "舒婷": { theme: "#be185d", secondary: "#701a75", sub: "独立与温柔的守望者", stats: [45, 65, 88, 75, 85], identity: "你拥有一种力量的温柔。强调自我独立与平视，拒绝攀附。", bio: "在理性复苏时代确立平等感性宣言。柔韧且有骨气。", motif: "拒绝攀附：我必须作为树和你站在一起。", echo: "你的温柔是有边界的，不为了爱而阉割自我。", anxiety: "害怕过度投入丧失个体自主性。", shadow: "过度的理性使你在感性瞬间显得缺乏激情。", longDesc: "文学是对人格自主的宣誓。证明深情与独立不矛盾。", quote: "我必须是你近旁的一株木棉。", books: [{title: "《致橡树》", author: "舒婷", desc: "当代情感独立精神圣经。"}] },
            "林徽因": { theme: "#db2777", secondary: "#701a75", sub: "秩序与美的构建者", stats: [35, 75, 50, 55, 95], identity: "你在秩序与感性间寻找平衡。你认为审美是人最后的尊严。", bio: "用理性框架支撑审美，追求词藻纯正。在废墟上建立优雅的理想国。", motif: "废墟上的优雅：审美是动荡下的避难所。", echo: "你是那个即便在杂乱环境中也要摆上一束花的人。", anxiety: "害怕外部世界的丑陋彻底摧毁内心的宁静。", shadow: "过度追求高级可能让你无法直视真实的丑陋。", longDesc: "你守护审美，认为那是人的尊严。你一生在试图将破碎的感性，缝补进理性的结构。", quote: "你是人间的四月天，笑响点亮了四面风。", books: [{title: "《你是人间的四月天》", author: "林徽因", desc: "理性与感性的完美缝合。"}] },
            "王安忆": { theme: "#9d174d", secondary: "#500724", sub: "弄堂逻辑的织梦人", stats: [45, 90, 75, 55, 80], identity: "你迷恋细枝末节的厚度。真相藏在最细小的生存博弈之中。", bio: "最具耐性的工笔画家。在弄堂碎裂逻辑中缝制史诗，探讨城市精神。", motif: "寻找逻辑：通过细致描摹重塑秩序感。", echo: "你是细节控，擅长从偶然推断必然。", anxiety: "害怕城市精神在商业化洪流中丧失人情味逻辑。", shadow: "过于绵密的细节消解叙事爆发力。", longDesc: "你认为文学是高级工笔画。重塑叙事逻辑，让细碎光影获得不朽。", quote: "在繁华的尘埃里，寻找人世的逻辑。", books: [{title: "《长恨歌》", author: "王安忆", desc: "上海弄堂里的情感史诗。"}] },
            "老舍": { theme: "#92400e", secondary: "#451a03", sub: "平民脊梁的守望者", stats: [65, 70, 60, 55, 85], identity: "你扎根于大地的泥土。你对平凡人的尊严持有深刻同情。你认为‘体面’是最后的骨气。", bio: "京派大师。在幽默下深藏文明崩塌的悲痛，记录平凡人的脊梁。", motif: "体面的脆弱：文明消失往往始于一个平凡人的无声崩裂。", echo: "你在琐碎生活中追求‘讲究’，对烟火气有天然亲近感。", anxiety: "害怕传统文明根基断裂，害怕温情变质。", shadow: "对故土的极度依恋有时转化为保守忧伤。", longDesc: "你在幽壳下记录平民尊严。记录正在消失的文明，记录那些车轮下想站稳的人。", quote: "活着，这就是生活。", books: [{title: "《四世同堂》", author: "老舍", desc: "民族魂魄的微观史诗。"}] },
            "三毛": { theme: "#ea580c", secondary: "#7c2d12", sub: "流浪的存在主义者", stats: [88, 45, 75, 98, 65], identity: "你将生命过成实验。在不断行走中发明‘自我’。认为远方才是唯一的归宿。", bio: "拒绝被定义。唤醒整整一代人对自由的原始渴望。", motif: "身份在路上：自由是灵魂唯一燃料。", echo: "你是那个在深夜突然想飞向异乡的人，讨厌任何标签。", anxiety: "害怕被一段关系定义或束缚。", shadow: "极致自我中心导致与真实社会脱节。", longDesc: "你拒绝平庸。文字带有异域狂风。你在远方寻找姓名，用一生抗拒灵魂枯萎。", quote: "如果你给我的，和你给别人的一样，那我就不要了。", books: [{title: "《撒哈拉的故事》", author: "三毛", desc: "对自由最热烈的灵魂呼唤。"}] },
            "金庸": { theme: "#854d0e", secondary: "#422006", sub: "江湖秩序的重构者", stats: [75, 65, 55, 75, 92], identity: "你在成人世界编织童话。你是在为现代人构建一套古典的侠义秩序。", bio: "武侠宗师。将华夏文明中最后的风骨与道义融入通俗叙事。", motif: "知其不可而为之：情义是生命底色。", echo: "在竞争激烈的社会，你依然坚守‘底线’和‘正义’。", anxiety: "害怕传统侠义精神在现代功利主义前崩塌。", shadow: "过度的英雄主义让你忽视了现实的阴暗。", longDesc: "你在为社会提供另一种想象空间。文学是浪漫主义的最后阵地。", quote: "侠之大者，为国为民。", books: [{title: "《射雕英雄传》", author: "金庸", desc: "侠义精神的现代图腾。"}] }
        };

        const QUESTIONS = [
            { id: 1, text: "提起「时间」，你最先想到的意象是：", origin: "古典的归途", desc: "在时间的褶皱里，你是如何辨认自己的位置？", reading: "《春江花月夜》", annotation: "时间的形态决定了生命的重力感。是流向虚无的无奈，还是沉淀成金的笃定？", options: [
                { text: "一江春水。流走了，就再也回不来了。", target: "沈从文" },
                { text: "庭前落花。年年看着都一样，可人早变了。", target: "张爱玲" },
                { text: "寒灯夜雨。窗外滴答个没完，一晃眼就是半生。", target: "史铁生" },
                { text: "指间沙。越想攥紧，漏得越快。", target: "三毛" }
            ]},
            { id: 2, text: "面对「独处」，你的状态更贴合：", origin: "精神的孤岛", desc: "孤独不是为了躲避，而是为了与真实的自我对谈。", reading: "《小窗幽记》", annotation: "独处的姿态是你与外界建立防线的方式。你是那个审视者，还是那个在荒原耕耘的人？", options: [
                { text: "把自己缩成一个句号。外面的风浪再大，也别想撞开这道清醒的门。", target: "鲁迅" },
                { text: "在脑子里盖房子。拆了盖、盖了拆，光这种智性的博弈就能玩一整天。", target: "王小波" },
                { text: "在烟火气里躲着。看草木生长、三餐起火，在这种细碎里觉得踏实。", target: "沈从文" },
                { text: "在路途上自我对话。把以前的伤疤摊开来看，看着看着就觉得没那么疼了。", target: "史铁生" }
            ]},
            { id: 3, text: "如果要写一个「理想主义者」的结局，你会安排：", origin: "理想之死", desc: "当理想撞上现实的铁墙，你选择交出怎样的灵魂？", reading: "《离骚》", annotation: "失败往往比成功更能暴露出一个人的骨骼。你对‘必败之战’的态度决定了你的尊严。", options: [
                { text: "明知道这事成不了，还是一直做，哪怕只是为了争口气。", target: "鲁迅" },
                { text: "一辈子都在追一个答案，到最后也没摸到门，就这么停下了。", target: "莫言" },
                { text: "拼尽了全力最后啥也没得到，却从来没说过一句认输的话。", target: "金庸" },
                { text: "为了心里的美好越走越偏，最后把自己的日子都搭进去了。", target: "曹雪芹" }
            ]},
            { id: 4, text: "你心里的「孤独」，更像下面哪句白描？", origin: "灵魂的剪影", desc: "孤独是生命的本质，你是如何安放这份空寂的？", reading: "《孤独六讲》", annotation: "孤独的质感揭示了你灵魂最核心的恐惧。是怕被冷落，还是怕被定义？", options: [
                { text: "清醒的孤勇。身在人群里，却冷眼看着人性的荒诞，像看一场闹剧。", target: "残雪" },
                { text: "智性的孤高。不愿与世俗同流合污，在思想里寻找同类。", target: "钱钟书" },
                { text: "细腻的怅惘。月色照进空屋子，总觉得有点凉飕飕的、说不出的愁绪。", target: "曹雪芹" },
                { text: "行走的修行。脚下不停，心里才能静得下来，慢慢跟孤独讲个和。", target: "三毛" }
            ]},
            { id: 5, text: "面对一本「旧书」，你的感受更贴合：", origin: "故人的回响", desc: "翻开书页的瞬间，你是在寻找共鸣还是在寻找真相？", reading: "《写在人生边上》", annotation: "你对‘过去’的提取方式，揭示了你对时间伤疤的敏感度。", options: [
                { text: "字里行间都是时代的伤痕与人性的复杂，越读越清醒", target: "萧红" },
                { text: "满是思辨与智慧，在旧文字里看见更清醒的世界秩序", target: "钱钟书" },
                { text: "藏着旧时光的温柔与诗意，每一页都是人间的烟火与深情", target: "汪曾祺" },
                { text: "写满岁月的沉淀与治愈，在文字里慢慢读懂生活的本真", target: "杨绛" }
            ]},
            { id: 6, text: "关于「记忆」，你更倾向于这种描述：", origin: "时间的褶皱", desc: "过去从不会真的死去，它只是藏在记忆的褶皱里。", reading: "《半生缘》", annotation: "你提取记忆的滤镜是什么？是痛苦的教训，还是美好的幻影？", options: [
                { text: "记忆是把手术刀。切开那些结了痂的伤疤，时刻提醒自己别再犯傻。", target: "鲁迅" },
                { text: "记忆是书斋里的索引。把旧事儿都归档分类，只为了看清现在的路。", target: "钱钟书" },
                { text: "记忆是红楼的残梦。越是回不去，就越想给那抹余晖上道亮色。", target: "曹雪芹" },
                { text: "记忆是行走的重力感。背着它挺沉，但要是丢了，路就走虚了。", target: "余华" }
            ]},
            { id: 7, text: "生活累了，你想活成谁笔下的样子：", origin: "避难所的抉择", desc: "如果世界让你疲惫，你会逃向哪里？", reading: "《雨天的书》", annotation: "避风港的质感反映了你精神原色的底层需求。", options: [
                { text: "还得在这孤独里反思。绝不让外界那帮声音，吵醒了我这颗清醒的心。", target: "残雪" },
                { text: "躲进我的小宇宙。在书斋里研究草木虫鱼，看这世界就像看一场戏。", target: "周作人" },
                { text: "在弄堂的拐角里待着。数着碎日子里的每一个波动，觉得这样挺好。", target: "王安忆" },
                { text: "背起行囊就走。去那个没边没沿的荒原，在那儿认领真正的自由。", target: "三毛" }
            ]},
            { id: 8, text: "你所渴望的「自由」，更贴近哪种状态？", origin: "无声的宣言", desc: "自由不是随心所欲，而是拥有一套不被定义的底牌。", reading: "《自由在高处》", annotation: "自由的定义指向你内心最渴望打破的枷锁。", options: [
                { text: "精神的硬骨头。绝不被那帮规矩给磨平了，敢在这沉默里喊一嗓子。", target: "鲁迅" },
                { text: "思想的真空。哪怕身在阴沟，逻辑也得清清爽爽，不受任何人的偏见干扰。", target: "王小波" },
                { text: "情感的任性。只忠于自己那一瞬间的颤动，别管别人说那是矫情还是疯狂。", target: "舒婷" },
                { text: "步子的自由。能在平凡日子里走出自己的节奏，谁也别想把我牵走。", target: "杨绛" }
            ]},
            { id: 9, text: "面对「遗憾」，你更像哪种心境？", origin: "命途的残章", desc: "有些故事注定没有结局，你是如何与它告别的？", reading: "《长恨歌》", annotation: "遗憾是生命的呼吸。接受还是超越？这决定了你故事的底色。", options: [
                { text: "看透这出戏终究要散。哪怕连个谢幕都没有，也得体体面面地退场。", target: "张爱玲" },
                { text: "研究明白这个死结。既然结局变不了，起码得弄清楚这坑是怎么掉进去的。", target: "钱钟书" },
                { text: "把它写进最温柔的字里。让遗憾在这笔墨里慢慢化开，变得不那么扎心。", target: "沈从文" },
                { text: "拍拍灰，继续往前赶路。遗憾也是命的一部分，没必要总是回头看。", target: "史铁生" }
            ]},
            { id: 10, text: "你喜欢的「相处方式」，更贴合：", origin: "人间的尺度", desc: "在人与人的缝隙里，你留下了多大的呼吸空间？", reading: "《沉默的大多数》", annotation: "社交偏好是你自我边界的投射。是高冷的独立，还是温润的陪伴？", options: [
                { text: "冷清清的距离。不迎合、不讨好，宁愿一个人在这寂静里待着。", target: "鲁迅" },
                { text: "智性的相知。只跟懂的人聊透，不懂的人一句话都嫌多，纯属浪费生命。", target: "王小波" },
                { text: "无声的守望。在平凡日子里互相做个伴，不用废话，懂的人自然懂。", target: "汪曾祺" },
                { text: "平实的相随。接受大家的普通与疏离，像水流过石头，互不干扰也挺好。", target: "老舍" }
            ]},
            { id: 11, text: "你理解的「人间烟火」，更贴合：", origin: "俗世的温存", desc: "烟火气里不只有三餐，还有对生命的慈悲。", reading: "《人间草木》", annotation: "你对底层的观察视角决定了你文学原型的重力感。", options: [
                { text: "烟火背后的血痕。在底层的挣扎里，看透人性的荒诞与那点不灭的火光。", target: "余华" },
                { text: "闹市里的冷眼。在市井的嘈杂中，寻找那条有趣的、智性的逻辑线索。", target: "钱钟书" },
                { text: "吊脚楼的清晨。在河边的喧闹和茶馆的闲谈里，触摸那抹最古老的深情。", target: "沈从文" },
                { text: "热茶碗的温热。在最平常的一粥一饭里，找回被世事磨损掉的那点暖意。", target: "杨绛" }
            ]},
            { id: 12, text: "面对「虚伪场合」，你的做法更贴合：", origin: "审视者的目光", desc: "当虚伪成为通用的社交货币，你选择沉默还是离场？", reading: "《围城》", annotation: "虚伪是成人世界的必修课，你的反应是你对“主体性”的防守。", options: [
                { text: "在那儿冷笑着。看这帮人在那演戏，心里早就扔出一记记投枪了。", target: "鲁迅" },
                { text: "通透地配合一下表演。心里门儿清，绝不入戏，就当是看一场杂耍。", target: "钱钟书" },
                { text: "悄悄躲开。这股子浑浊的气味会扎疼我的审美，宁愿回屋守着那点清净。", target: "林徽因" },
                { text: "硬着头皮走完。不纠结这种无聊的事，心里稳得住，就当是必经的路。", target: "史铁生" }
            ]},
            { id: 13, text: "你所认同的「成熟」，更贴合：", origin: "骨骼的生长", desc: "成熟不是磨平棱角，而是学会给棱角找一个庄严的安放处。", reading: "《我与地坛》", annotation: "成熟是一个不断剔除伪装、认领真实的漫长过程。", options: [
                { text: "看透了这惨淡的现实。即便知道喊不醒大家，也还是要反抗到底。", target: "丁玲" },
                { text: "看透了世界的荒诞。还能在那儿保持清醒的独立，谁也别想忽悠我。", target: "周作人" },
                { text: "接纳了生命的残缺。在那些支离破碎的日子里，还能守住内心的诗意。", target: "迟子建" },
                { text: "认领了这种宿命。在苦难里慢慢磨出一身硬骨头，不仅能扛，还能笑。", target: "余华" }
            ]},
            { id: 14, text: "你最抗拒下面哪种境遇？", origin: "自由的防线", desc: "识别你灵魂最深处的那块不可触碰的红线。", reading: "《野草》", annotation: "痛苦往往源于你对某种核心权利的丧失。", options: [
                { text: "麻木。眼睁睁看着自己变成一个没有知觉、只会听话的零件。", target: "鲁迅" },
                { text: "愚昧。活在偏见的壳子里，还以为自己掌握了这世上唯一的真理。", target: "钱钟书" },
                { text: "冷漠。那种功利到骨子里的算计，把人间最后的一点温柔全给毁了。", target: "沈从文" },
                { text: "被囚。身体被生活琐碎困死，连行走和思考的最后那点自由都没了。", target: "三毛" }
            ]},
            { id: 15, text: "你期待的「爱情」，更贴合：", origin: "命定的小径", desc: "在人海中，你渴望的是博弈后的理解，还是并肩的修行？", reading: "《致橡树》", annotation: "爱情不是寻找另一半，而是寻找那个能映照出你精神原色的人。", options: [
                { text: "两个清醒者的对决。不攀附、不讨好，在反抗路上彼此成就。", target: "萧红" },
                { text: "两个智性灵魂的交锋。在思想里互相吸引，在逻辑里共同生长。", target: "王小波" },
                { text: "两个守望者的重逢。在烟火和诗意里，慢慢走过这一生，无声却深情。", target: "舒婷" },
                { text: "两个修行者的陪伴。在平凡和苦难里互相扶一把，慢慢找回生活的本真。", target: "金庸" }

                                h('div', { className: "space-y-1" },
                                    h('h2', { className: "text-4xl font-bold tracking-widest text-[#3a3833]" }, selectedWriter),
                                    h('p', { className: "text-[10px] font-bold text-[#35afcb] uppercase tracking-[0.2em]" }, dossier.sub)
                                ),
                                h('div', { className: "flex gap-2" }, (dossier.tags || []).map(t => h('span', { key: t, className: "text-[8px] border border-[#dcd8cf] px-1.5 py-0.5 opacity-50 font-bold" }, "#" + t)))
                            ),
                            h('div', { className: "space-y-4" },
                                h('p', { className: "text-[12px] leading-[1.8] text-[#6d6b64] text-justify font-light" }, dossier.bio),
                                h('div', { className: "space-y-1.5" },
                                    h('h4', { className: "text-[9px] font-bold uppercase tracking-widest opacity-30 flex items-center gap-2" }, h('div', { className: "w-3 h-[1px] bg-black" }), " 精神坐标 / IDENTITY"),
                                    h('p', { className: "text-[12px] leading-relaxed text-[#3a3833] italic bg-white bg-opacity-50 p-3 border-l-2 border-[#e8ed2a]" }, dossier.identity)
                                )
                            )
                        ),
                        h('div', { className: "space-y-8 pt-8" },
                            h('div', { className: "space-y-4 " + (showCodeError ? 'shake-ani' : '') },
                                h('div', { className: "flex flex-col items-center gap-2" },
                                    h('span', { className: "text-[10px] uppercase tracking-[0.3em] opacity-40 font-bold" }, "通行码认证 / ACCESS CODE"),
                                    h('input', { type: "text", value: code, onChange: (e) => setCode(e.target.value), className: "redeem-input w-48 py-2 text-sm text-center", placeholder: "请输入通行码解锁测试" })
                                )
                            ),
                            h('button', { onClick: handleVerify, className: "w-full py-7 bg-[#3a3833] text-white text-[12px] tracking-[0.8em] font-bold shadow-2xl active:scale-95 transition-all" }, "开启漫游 / ENTER"),
                            h('div', { className: "text-[10px] text-gray-400 tracking-[0.3em] pb-12" }, "Designed by @云树cloudtree")
                        )
                    )
                );
            }

            if (step === 'quiz') {
                const q = QUESTIONS[currentQuestion];
                return h('div', { className: "max-w-xl mx-auto px-6 py-12 animate-fade-in" },
                    h('div', { className: "space-y-8" },
                        h('div', { className: "flex justify-between items-center text-[10px] opacity-40 font-bold tracking-widest" },
                            h('button', { onClick: handleBack }, "BACK"),
                            h('span', null, "DECISION " + (currentQuestion + 1) + " / " + QUESTIONS.length)
                        ),
                        h('div', { className: "context-box" },
                            h('div', { className: "flex items-center gap-4 mb-4" },
                                h('span', { className: "tag-black" }, "叙事背景"),
                                h('span', { className: "text-xs font-bold opacity-80" }, q.origin)
                            ),
                            h('p', { className: "text-xs leading-relaxed opacity-60 italic mb-4" }, q.desc),
                            h('div', { className: "flex items-center gap-4" },
                                h('span', { className: "tag-outline" }, "扩展阅读"),
                                h('span', { className: "text-[10px] opacity-40" }, q.reading)
                            )
                        ),
                        h('h2', { className: "text-[22px] leading-[1.6] font-medium text-[#3a3833] mb-10" }, q.text),
                        h('div', { className: "space-y-2" },
                            q.options.map((opt, i) => 
                                h('button', { key: i, onClick: () => handleAnswer(opt.target), className: "option-btn text-sm leading-relaxed" }, opt.text)
                            )
                        ),
                        h('div', { className: "pt-8" },
                            h('button', { 
                                onClick: () => setShowAnnotation(!showAnnotation), 
                                className: "text-[11px] font-bold opacity-40 flex items-center gap-1 hover:opacity-100 transition-all" 
                            }, showAnnotation ? "收起注解 ︿" : "展开注解 ﹀"),
                            showAnnotation && h('div', { className: "mt-4 text-xs leading-[2] text-[#6d6b64] italic animate-fade-in border-t border-[#dcd8cf] pt-4" }, q.annotation)
                        )
                    )
                );
            }

            if (step === 'result' && result) {
                return h('div', { className: "max-w-xl mx-auto px-4 py-8 relative animate-fade-in" },
                    h('div', { className: "space-y-8 pb-12" },
                        h('div', { ref: captureRef, className: "pb-12 bg-[#f2f0e9] overflow-hidden rounded-2xl result-card relative text-left" },
                            h('div', { className: "p-12 text-center relative overflow-hidden", style: { background: "linear-gradient(135deg, " + result.theme + ", " + result.secondary + ")" } },
                                h('div', { className: "absolute top-0 left-0 w-full h-full opacity-10" },
                                    h('svg', { width: "100%", height: "100%", viewBox: "0 0 100 100", preserveAspectRatio: "none" },
                                        h('path', { d: "M0,0 L100,0 L100,20 Q50,40 0,20 Z", fill: "white" }),
                                        h('circle', { cx: "90", cy: "10", r: "15", fill: "white" })
                                    )
                                ),
                                h('div', { className: "relative z-10 space-y-6" },
                                    h('div', { className: "flex justify-center mb-2" },
                                        h('div', { className: "px-3 py-1 bg-white bg-opacity-20 text-white text-[8px] tracking-[0.5em] uppercase font-bold border border-white border-opacity-30 rounded-sm" }, "Archetype No. " + Math.floor(Math.random() * 10000))
                                    ),
                                    h('h2', { className: "text-5xl md:text-6xl font-bold text-white tracking-[0.2em] text-center" }, result.name),
                                    h('div', { className: "space-y-4" },
                                        h('p', { className: "text-sm text-white italic font-light tracking-[0.5em] opacity-90 text-center" }, result.sub),
                                        h('div', { className: "flex justify-center gap-3" },
                                            h('span', { className: "px-4 py-1.5 bg-white text-[10px] font-bold uppercase tracking-widest rounded-full shadow-lg", style: { color: result.theme } }, "原型匹配度 98.7%")
                                        )
                                    )
                                )
                            ),
                            h('div', { className: "px-6 -mt-10 relative z-20" },
                                h('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-6 bg-white p-8 border border-[#dcd8cf] rounded-3xl shadow-2xl items-center mb-8" },
                                    h('div', { className: "space-y-4 text-left" },
                                        h('h4', { className: "text-[11px] font-bold border-b pb-2 text-[#3a3833] opacity-60 uppercase tracking-widest" }, "叙事基因分析 / ANALYSIS"),
                                        h('div', { className: "space-y-3 text-[10px]" },
                                            h('div', { className: "flex justify-between items-center text-gray-400 uppercase" },
                                                h('span', null, "批判逻辑"),
                                                h('div', { className: "w-24 h-1 bg-gray-100" }, h('div', { className: "h-full", style: { width: result.stats[0] + "%", backgroundColor: result.theme } }))
                                            ),
                                            h('div', { className: "flex justify-between items-center text-gray-400 uppercase" },
                                                h('span', null, "智性深度"),
                                                h('div', { className: "w-24 h-1 bg-gray-100" }, h('div', { className: "h-full", style: { width: result.stats[1] + "%", backgroundColor: result.theme } }))
                                            ),
                                            h('div', { className: "flex justify-between items-center text-gray-400 uppercase" },
                                                h('span', null, "审美强度"),
                                                h('div', { className: "w-24 h-1 bg-gray-100" }, h('div', { className: "h-full", style: { width: result.stats[2] + "%", backgroundColor: result.theme } }))
                                            )
                                        )
                                    ),
                                    h('div', { className: "aspect-square w-full max-w-[180px] mx-auto" }, h('canvas', { ref: radarCanvas }))
                                ),
                                h('div', { className: "p-10 bg-white border border-[#dcd8cf] rounded-3xl shadow-sm mb-8 space-y-6 relative overflow-hidden text-left" },
                                    h('div', { className: "flex items-center gap-3 border-b border-gray-50 pb-4" },
                                        h('span', { className: "text-[11px] font-bold uppercase tracking-[0.3em] text-[#3a3833] opacity-60" }, "文学史回响 / CONTEXT")
                                    ),
                                    h('p', { className: "text-[13px] text-[#6d6b64] leading-[2.2] text-justify tracking-wide italic" }, result.bio)
                                ),
                                h('div', { className: "relative p-10 bg-white border border-[#dcd8cf] text-center rounded-3xl shadow-sm mb-8" },
                                    h('p', { className: "text-xl md:text-2xl leading-[1.8] font-medium italic mb-6 text-center" }, h('span', { className: "highlight-yellow" }, "“" + result.quote + "”")),
                                    h('div', { className: "text-[10px] text-[#a4c29b] tracking-widest uppercase font-bold text-center" }, "— " + result.name + " —")
                                ),
                                h('div', { className: "space-y-12 px-2 text-left" },
                                    h('section', { className: "space-y-4" },
                                        h('h4', { className: "text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-[#3a3833] opacity-60" }, "精神原色 / THE SELF"),
                                        h('div', { className: "bg-white p-8 border-l-4 space-y-6", style: { borderColor: result.theme } },
                                            h('p', { className: "text-[14px] leading-relaxed text-[#6d6b64] italic" }, "“" + result.identity + "”"),
                                            h('p', { className: "text-[14px] leading-relaxed font-light" }, result.longDesc)
                                        )
                                    ),
                                    h('section', { className: "space-y-4 text-left" },
                                        h('h4', { className: "text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-[#3a3833] opacity-60" }, "精神母题与当代图景 / MOTIF & ECHO"),
                                        h('div', { className: "grid grid-cols-1 gap-6 text-[13px]" },
                                            h('div', { className: "p-6 bg-gray-50 border border-gray-100 rounded text-left" },
                                                h('div', { className: "font-bold mb-2 opacity-60 uppercase text-[10px]" }, "灵魂叙事母题"),
                                                h('div', { className: "opacity-80 leading-relaxed italic" }, result.motif)
                                            ),
                                            h('div', { className: "p-6 bg-blue-50 bg-opacity-30 border border-blue-100 rounded text-left" },
                                                h('div', { className: "font-bold mb-2 opacity-60 uppercase text-[10px]" }, "当代生活样本"),
                                                h('div', { className: "opacity-80 leading-relaxed" }, result.echo)
                                            )
                                        )
                                    ),
                                    h('section', { className: "space-y-4 text-left" },
                                        h('h4', { className: "text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-red-800 opacity-60" }, "核心焦虑与盲区"),
                                        h('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-4 text-[13px]" },
                                            h('div', { className: "p-6 bg-red-50 border border-red-100 rounded text-left" },
                                                h('div', { className: "font-bold mb-2 opacity-60 uppercase text-[10px]" }, "主导焦虑"),
                                                h('div', { className: "opacity-80 text-red-900" }, result.anxiety)
                                            ),
                                            h('div', { className: "p-6 bg-gray-50 border border-gray-100 rounded text-left" },
                                                h('div', { className: "font-bold mb-2 opacity-60 uppercase text-[100x]" }, "阴影面"),
                                                h('div', { className: "opacity-70" }, result.shadow)
                                            )
                                        )
                                    ),
                                    h('section', { className: "space-y-6 text-left" },
                                        h('h4', { className: "text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-[#3a3833] opacity-60" }, "灵魂处方 / PRESCRIPTION"),
                                        h('div', { className: "grid gap-4" },
                                            (result.books || []).map((book, i) => 
                                                h('div', { key: i, className: "bg-white p-6 border border-[#dcd8cf] rounded-xl shadow-sm text-left" },
                                                    h('h5', { className: "text-[16px] font-bold mb-1" }, book.title),
                                                    h('p', { className: "text-[10px] text-[#a4c29b] font-bold mb-3 uppercase" }, "作者: " + book.author),
                                                    h('p', { className: "text-[13px] text-[#6d6b64] italic leading-relaxed opacity-80" }, book.desc)
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                        ),
                        h('div', { className: "pt-8 space-y-4 text-center px-4" },
                            h('button', { onClick: saveAsImage, disabled: isSaving, className: "w-full py-6 bg-black text-white text-[11px] font-bold uppercase tracking-[0.6em] shadow-2xl active:scale-95 transition-all rounded-2xl" }, isSaving ? "正在生成中..." : "保存手稿报告 / SAVE REPORT"),
                            h('button', { onClick: handleRestart, className: "w-full py-6 border border-[#3a3833] text-[#3a3833] text-[11px] font-bold uppercase tracking-[0.6em] hover:bg-[#3a3833] hover:text-white transition-all rounded-2xl" },
                                h('span', null, " 再次校准原型")
                            )
                        )
                    ),
                    h('footer', { className: "mt-16 pt-16 border-t border-[#dcd8cf] text-center space-y-4" },
                        h('p', { className: "text-[10px] tracking-[0.6em] uppercase text-[#3a3833] font-bold opacity-60" }, "© 2026 CURATED BY @云树CLOUDTREE")
                    )
                );
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(App));
    </script>
</body>
</html>
