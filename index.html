    <style>

    <script>
        const { useState, useEffect, useRef, createElement: h } = React;

        const WRITER_DATA = {
            "鲁迅": { theme: "#b91c1c", secondary: "#1a1a1a", sub: "拒绝麻木的审视者", status: "启蒙者 / 骨相嶙峋", tags: ["国民性解剖", "铁屋呐喊"], quote: "横眉冷对千夫指，俯首甘为孺子牛。", stats: [98, 70, 40, 60, 95], identity: "你对平庸的妥协持有生理性的敌意。相比于模糊的幸福，你更尊重清醒的痛感。", bio: "中国现代文学的开山鼻祖。他解剖民族潜意识，撕开伪善温情，在绝望中确立清醒者的最高尊严。", motif: "绝望的反抗：在困局中，由于洞察真相而不得不发出的呐喊。对他而言，沉默即是参与谋杀。", echo: "你是那个能一眼识破话术泡沫的人。你无法融入廉价的乐观，你的‘毒舌’背后是对生命极致纯正性的洁癖。", anxiety: "害怕由于大众的麻木而导致坚持的真理变成一场孤单的噪音。", shadow: "极度的批判主义可能演化为对他人及对自己的一种‘精神性自虐’。", longDesc: "你的人生是持续的自我献祭。你拒绝任何形式的安抚，认为只有痛感才是确认生命主体性存在的铁证。", books: [{title: "《野草》", author: "鲁迅", desc: "生命在死火与焦土上的自我拉扯。"}] },
            "张爱玲": { theme: "#4338ca", secondary: "#1e1b4b", sub: "华丽废墟的守望者", status: "洞察者 / 苍凉底色", tags: ["海派传奇", "世俗物哀"], quote: "生命是一袭华丽的袍，爬满了蚤子。", stats: [50, 95, 85, 45, 65], identity: "你在琐碎日常的折痕里发现了命运的不可抗力。你迷恋精致，但更洞穿精致背后的腐朽。", bio: "现代文学史上最清醒的异类。她放弃宏大叙事，专攻人性深处的自私与尴尬。美与幻灭在她的笔下达成凄凉共振。", motif: "文明荒原：在时代废墟折痕里，捕捉一抹带有霉味的精致感。认为人的情感本质上是基于自私的收留。", echo: "你是那个在热闹聚会中突然感到一阵寒意的人。你看穿了物质堆砌出来的虚假体面。", anxiety: "害怕被时间的荒野彻底抛弃，害怕平庸的生活消磨掉最后一丝灵气。", shadow: "过度的清醒导致了对他人的极度疏离，容易陷入一种自怨自艾的虚无。", longDesc: "你有一双洞穿繁华的冷眼。你记录那些在欲望博弈中逐渐枯萎的灵魂。你认为真实即是苍凉。", books: [{title: "《传奇》", author: "张爱玲", desc: "旧梦折痕里最真实的人性博弈。"}] },
            "沈从文": { theme: "#0891b2", secondary: "#164e63", sub: "流水与人性的纪录者", status: "造梦人 / 自然原力", tags: ["湘西神话", "人性本真"], quote: "我爱过一个正当最好年龄的人。", stats: [40, 60, 95, 80, 55], identity: "你在物质文明的噪音中退守河边。你坚信自然的法则高于社会的逻辑。", bio: "来自湘西的文学赤子。他用白描笔法构建了一个未经污染的人性圣殿，在都市喧嚣外，礼赞原始生命力的纯粹与哀伤。", motif: "自然的秩序：流水带走野花，藏着宇宙最丰饶的真相。认为人性最本真的部分应如植物般无声生长。", echo: "在内卷的时代，你是那个向往‘归园田居’的人。你对他人的善意不带功利，具有一种近乎神性的守望感。", anxiety: "害怕现代文明的铁蹄会彻底粉碎人性中最后温润、纯净的那个角落。", shadow: "过度的自然主义可能导致对现实社会残酷竞争的被动逃避，显得柔弱。", longDesc: "你迷恋自然的纯粹。文学应是对情感自然的敬畏与描摹。你眼中的人带着土地的神性。", books: [{title: "《边城》", author: "沈从文", desc: "在湘西烟雨中寻找未被污染的灵魂。"}] },
            "钱钟书": { theme: "#0f766e", secondary: "#134e4a", sub: "围城外的智性审视者", status: "冷眼人 / 智性巅峰", tags: ["博通中外", "围城困局"], quote: "城外的人想冲进去，城里的人想出来。", stats: [65, 98, 55, 85, 50], identity: "你追求绝对智性，对文明的尴尬有着精准的解剖。你用嘲弄作为防御，对抗这个世界的愚昧。", bio: "博通中外的视野俯视众生，对人类在欲望驱使下的尴尬表演给予了最优雅、最刻薄的注脚。", motif: "围城的逻辑：人类所有的选择都是基于对他者的误解。这种结构性荒谬是无法逃脱的循环。", echo: "你是朋友圈里那个最不屑于‘矫情’的人。你擅长解构别人的崇高感，享受博学的孤独。", anxiety: "害怕由于过于博学陷入‘书斋困局’。", shadow: "智性的快感可能掩盖了对生命真实温度的感知，显得过于傲慢。", longDesc: "你享受智力的博弈。文学是充满反讽的游乐场。你在荒诞的人间建立起一套逻辑自洽的避难所。", books: [{title: "《围城》", author: "钱钟书", desc: "现代人精神尴尬与结构性困局的启示录。"}] },
            "王小波": { theme: "#1d4ed8", secondary: "#1e3a8a", sub: "智性趣味的自由者", status: "理侠 / 逻辑之美", tags: ["反抗愚昧", "有趣灵魂"], quote: "一辈子很长，要找个有趣的人在一起。", stats: [85, 98, 70, 95, 60], identity: "你用逻辑消解一切‘崇高’。在你看来，‘有趣’是作为一个独立个体最重要的防御阵地。", bio: "文坛最独特的自由主义者。将诗意与逻辑完美融合，以漫不经心姿态解构权力教条。智慧本身就是一种美德。", motif: "诗性的理智：用幽默作为武器去戏谑那些自命不凡的平庸。认为人除了此生，还应拥有诗意世界。", echo: "你是那个拒绝被任何‘权力教条’洗脑的人。你的自由源于对他人的不要求。", anxiety: "害怕由于群体的集体愚昧而丧失个人精神的自主性。", shadow: "智性的优越感有时会演变为冷嘲，忽视了生命沉重感。", longDesc: "你拒绝被宏大词汇绑架。你在荒谬中保持着诚实的幽默感，在无趣世界开辟自由操场。", books: [{title: "《黄金时代》", author: "王小波", desc: "用理性和有趣对抗整个时代的荒诞。"}] },
            "史铁生": { theme: "#4b5563", secondary: "#111827", sub: "生命局限的静思者", status: "静思者 / 灵魂突围", tags: ["地坛哲思", "死亡契约"], quote: "死是一个必然会降临的节日。", stats: [75, 90, 65, 50, 98], identity: "你在废墟上思考生存。你承认肉身的局限，但你通过思想完成了对宿命的突围。", bio: "当代最具神性的作家。他在地坛的残垣断壁间完成了对存在意义的终极追问。活成了时代的精神坐标。", motif: "宿命的和解：在必然局限中，通过自我拷问，创造出无限宽广、安静的精神空间。", echo: "面对人生的低谷，你具有比常人更深沉的耐性。你不是在忍受，你是在参透。", anxiety: "害怕环境的长期禁锢，丧失了与外部宇宙建立深层连接的能力。", shadow: "深度的哲思带有沉重的宗教仪式感，使你显得与当下快节奏生活格格不入。", longDesc: "你承认人生的荒芜。你与死亡达成默契，获得了生的宁静。文学是对生命意义的救赎。", books: [{title: "《我与地坛》", author: "史铁生", desc: "关于生存、残缺与永恒的终极对谈。"}] },
            "萧红": { theme: "#7c3aed", secondary: "#4c1d95", sub: "呼兰河畔的漂泊灵性", status: "漂泊者 / 野生灵性", tags: ["东北荒野", "洛神遗风"], quote: "那是呼兰河传，那是我的小城故事。", stats: [70, 45, 90, 98, 75], identity: "你有野生的直觉。你在荒凉岁月里记录孤独，灵魂是一场永不停歇的迁徙。", bio: "天才的‘文学洛神’。一生是仓皇出逃，文字是对阵痛最敏锐的捕捉。生命粗砺如泥，却透着神辉。", motif: "生死场上的颤动：人类卑微且顽强地生灭，野性是文学本质。认为痛苦源于灵魂太丰盈。", echo: "在安稳生活中，你总感到莫名的‘无家可归感’。你讨厌按部就班，渴望旷野。", anxiety: "害怕定居丧失灵魂中最宝贵的野生感。", shadow: "极度漂泊感可能使人生在现实层面无法落脚，显得极其脆弱。", longDesc: "你在荒凉岁月里赤脚行走。生命是无终点的迁徙。你的文字充满了原始的战栗感。", books: [{title: "《呼兰河传》", author: "萧红", desc: "勾勒人类生灭的原始长卷。"}] },
            "曹雪芹": { theme: "#ca8a04", secondary: "#713f12", sub: "大观园的织梦人", status: "织梦人 / 繁华幻灭", tags: ["红楼梦", "东方挽歌"], quote: "质本洁来还洁去，强于污淖陷渠沟。", stats: [40, 80, 98, 45, 90], identity: "你洞穿了万物覆灭，依然沉醉于记录那一抹华丽。你是美的最后陪葬者。", bio: "中国古典文学高峰。在幻梦中预演文明覆灭，实现世俗到美学总结的伟大质变。", motif: "美的悼词：质本洁来还洁去。认为极致美必然与幻灭共生，文学是对必逝之物的留存。", echo: "你极其注重生活仪式感。对权力的争夺感到厌倦，更愿在字里行间构建自己的‘大观园’。", anxiety: "害怕洁白被欲望染脏，害怕美被践踏。", shadow: "透彻宿命感导致你在现实生活中缺乏进取心。", longDesc: "你在字里行间构建幻梦。你坚信美是荒唐世界唯一的救赎。你试图挽留注定逝去的余晖。", books: [{title: "《红楼梦》", author: "曹雪芹", desc: "东方文明的美学终结与生命祭奠。"}] },
            "林徽因": { theme: "#be185d", secondary: "#701a75", sub: "纯净审美的构建者", status: "建筑师 / 纯净审美", tags: ["理性结构", "四月天"], quote: "你是人间的四月天，笑响点亮了四面风。", stats: [35, 75, 50, 55, 95], identity: "你在理性的建筑（秩序）与感性的诗歌（直觉）间寻找高贵的平衡。认为审美是人最后的尊严。", bio: "动荡时代建筑师。用理性框架支撑审美圣殿。追求词藻纯正与精神轻盈。", motif: "废墟上的优雅：审美是人在动荡下的避难所，用优雅秩序构建内心的理想国。", echo: "你是那个在杂乱环境中也要摆上一束花的人。你追求一种具有智性高度的、克制的深情。", anxiety: "害怕外部世界的丑陋会彻底毁灭掉你内心的宁静圣殿。", shadow: "过度追求高级，可能会导致你无法直视人性中必然存在的脓疮。", longDesc: "你守护审美，认为那是人的尊严。你一生在试图将破碎的感性，缝补进理性的结构。", books: [{title: "《你是人间的四月天》", author: "林徽因", desc: "在理性与感性间捕捉理想的微光。"}] },
            "老舍": { theme: "#92400e", secondary: "#451a03", sub: "平民脊梁的守望者", status: "守望者 / 平民脊梁", tags: ["北京地域", "市民宿命"], quote: "活着，这就是生活。", stats: [65, 70, 60, 55, 85], identity: "你扎根于大地的泥土。你对平凡人的尊严持有深刻同情。你认为‘体面’是最后的骨气。", bio: "京派大师。扎根胡同尘土写出民族魂魄史诗。在幽默下深藏文明崩塌的悲痛。", motif: "体面的脆弱：文明消失往往始于一个平凡人的无声崩裂。所有的幽默本质上是含泪自嘲。", echo: "你是那个在琐碎生活中追求‘讲究’的人。你对烟火气有天然亲近感，在乎普通人命运。", anxiety: "害怕传统文明根基彻底断裂，害怕温情的人际关系变质。", shadow: "对故土的极度依恋转化为保守忧伤，无法适应激进未来。", longDesc: "你在幽默外壳下记录平民尊严。记录正在消失的文明，记录那些车轮下想站稳的人。", books: [{title: "《四世同堂》", author: "老舍", desc: "民族魂魄的微观史诗，记录动荡下的尊严。"}] },
            "杨绛": { theme: "#166534", secondary: "#064e3b", sub: "洗净铅华的观察家", status: "观察家 / 洁白克制", tags: ["洗炼文风", "生命智慧"], quote: "我们仨，就剩下我一个了。", stats: [35, 92, 45, 55, 90], identity: "你在平淡中见真意。你的力量源于内心的安静。认为‘忍受’也是一种智慧。", bio: "文坛最宁静声音。经历世纪波澜，用最洁白笔触记录情感。饱含智慧。", motif: "守望灯火：在喧嚣边缘守住书卷，是对时代最温柔的反抗。", echo: "你是不需要社交填补空虚的人。有一种‘隐入烟尘’的高级感。", anxiety: "害怕外部喧嚣破坏内心的专注，丧失作为个体的温情。", shadow: "过度的克制让你显得对外部冲突缺乏热量，过于旁观。", longDesc: "经历动荡选择克制。文字是记录温度的日记。你在平庸现实上建立了花园。", books: [{title: "《我们仨》", author: "杨绛", desc: "极简文字下涌动的深情。"}] },
            "余华": { theme: "#1e293b", secondary: "#020617", sub: "苦难底色的生存者", status: "见证者 / 生存底色", tags: ["苦难叙事", "活着意志"], quote: "活着，活着本身就是唯一的理由。", stats: [75, 85, 50, 60, 98], identity: "你剥离了廉价感伤。在极端苦难前，人唯一的尊严就是忍受。活着是庄严的大山。", bio: "当代现实主义尖兵。揭示生命本能——忍受。在他的笔下，‘活着’不再是动词。", motif: "生存即道义：剥离理想后，在苦难中耕耘的影子才是真实。为了活着本身而活着。", echo: "在不确定环境中，你表现出惊人韧性. 务实，讨厌口号，在乎脚下的土地。", anxiety: "害怕生存物质的匮乏导致人丧失基本属性。", shadow: "冷静到近乎麻木的视角让你显得冷酷。建议允许自己在文字中放声大哭。", longDesc: "你用冰冷笔触书写极端痛感。关注生存本能。你是时代的见证者。", books: [{title: "《活着》", author: "余华", desc: "生存意志的最强音。"}] },
            "莫言": { theme: "#991b1b", secondary: "#450a0a", sub: "民间幻象的通灵者", status: "通灵者 / 大地幻象", tags: ["魔幻现实", "高密原力"], quote: "生死疲劳，从荒原到幻象。", stats: [85, 55, 95, 65, 80], identity: "你将民间的粗砺升华为绚烂幻觉。你相信土地下藏着原始欲望。", bio: "诺奖作家。民间荒诞编织成宏大魔幻现实。挖掘被格式化外的民族元神。", motif: "轮回的幻象：权力叙事下，大地的欲望、牺牲才是永恒。文字应如原始丛林般繁茂。", echo: "你想象力极丰，甚至有些‘野性’。对规矩感到压抑，喜欢在直觉世界横冲直撞。", anxiety: "害怕土地原始的生命力会被现代技术或逻辑彻底格式化。", shadow: "血腥与狂想的交织有时使表达过于感官过载。", longDesc: "你的叙事带有野性。通过重构民族苦难叙事，建立起一座通往潜意识深处的迷宫。", books: [{title: "《生死疲劳》", author: "莫言", desc: "东方魔幻现实主义巅峰。"}] },

                                    h('input', { type: "text", value: code, onChange: (e) => setCode(e.target.value), className: "redeem-input w-48 py-2 text-sm text-center", placeholder: "请输入通行码解锁测试" })
                                )
                            ),
                            h('button', { onClick: handleVerify, className: "w-full py-7 bg-[#3a3833] text-white text-[12px] tracking-[0.8em] font-bold shadow-2xl active:scale-95 transition-all" }, "开启漫游 / ENTER"),
                            h('div', { className: "text-[10px] text-gray-400 tracking-[0.3em] pb-12" }, "Designed by @云树cloudtree")
                        )
                    )
                );
            }

            if (step === 'quiz') {
                const q = QUESTIONS[currentQuestion];
                return h('div', { className: "max-w-xl mx-auto px-4 py-8 relative animate-fade-in" },
                    h('div', { className: "space-y-10 text-center py-6" },
                        h('div', { className: "flex justify-between items-center border-b border-[#dcd8cf] pb-4" },
                            h('button', { onClick: handleBack, className: "flex items-center gap-1 text-[10px] uppercase opacity-40 hover:opacity-100 transition-all font-bold tracking-widest" }, "BACK"),
                            h('span', { className: "text-[9px] uppercase text-[#6d6b64] font-black tracking-widest opacity-40" }, "DECISION " + String(currentQuestion + 1).padStart(2, '0') + " / 30"),
                            h('div', { className: "w-10" })
                        ),
                        h('div', { className: "min-h-[160px] flex flex-col items-center justify-center px-4 space-y-6" },
                            h('div', { className: "w-full text-left bg-[#3a383308] p-5 border-l-4 border-[#3a383333]" },
                                h('div', { className: "flex items-baseline gap-2 mb-2" },
                                    h('span', { className: "text-[10px] font-bold bg-[#3a3833] text-white px-1.5 py-0.5" }, "原著背景"),
                                    h('span', { className: "text-[12px] font-bold opacity-80" }, q.origin)
                                ),
                                h('p', { className: "text-[11px] leading-relaxed opacity-60 italic mb-2" }, q.desc),
                                h('div', { className: "flex items-baseline gap-2" },
                                    h('span', { className: "text-[8px] font-bold border border-[#3a383333] px-1.5 py-0.5 uppercase opacity-50" }, "扩展阅读"),
                                    h('span', { className: "text-[10px] opacity-40 font-medium" }, q.reading)
                                )
                            ),
                            h('h2', { className: "text-[18px] md:text-[21px] font-normal leading-[1.8] text-[#3a3833] text-justify border-t border-[#dcd8cf] pt-6" }, q.text)
                        ),
                        h('div', { className: "space-y-4 text-left" },
                            q.options.map((option, idx) => 
                                h('button', { key: idx, onClick: () => handleAnswer(option.target), className: "w-full p-6 bg-white bg-opacity-70 rounded-sm border border-[#dcd8cf] hover:border-[#3a3833] transition-all group active:bg-white text-left shadow-sm" },
                                    h('span', { className: "text-[15px] text-[#6d6b64] group-hover:text-[#3a3833] leading-relaxed pr-4" }, option.text)
                                )
                            )
                        ),
                        h('div', { className: "pt-6 flex justify-center" },
                            h('div', { className: "h-[1px] w-full bg-[#dcd8cf] relative opacity-50" },
                                h('div', { className: "h-full bg-[#3a3833] transition-all duration-700", style: { width: ((currentQuestion + 1) / 30 * 100) + "%" } })
                            )
                        )
                    )
                );
            }

            if (step === 'result' && result) {
                return h('div', { className: "max-w-xl mx-auto px-4 py-8 relative animate-fade-in" },
                    h('div', { className: "space-y-8 pb-12" },
                        h('div', { ref: captureRef, className: "pb-12 bg-[#f2f0e9] overflow-hidden rounded-2xl result-card relative text-left" },
                            h('div', { className: "p-12 text-center relative overflow-hidden", style: { background: "linear-gradient(135deg, " + result.theme + ", " + result.secondary + ")" } },
                                h('div', { className: "absolute top-0 left-0 w-full h-full opacity-10" },
                                    h('svg', { width: "100%", height: "100%", viewBox: "0 0 100 100", preserveAspectRatio: "none" },
                                        h('path', { d: "M0,0 L100,0 L100,20 Q50,40 0,20 Z", fill: "white" }),
                                        h('circle', { cx: "90", cy: "10", r: "15", fill: "white" })
                                    )
                                ),
                                h('div', { className: "relative z-10 space-y-6" },
                                    h('div', { className: "flex justify-center mb-2" },
                                        h('div', { className: "px-3 py-1 bg-white bg-opacity-20 text-white text-[8px] tracking-[0.5em] uppercase font-bold border border-white border-opacity-30 rounded-sm" }, "Archetype No. " + Math.floor(Math.random() * 10000))
                                    ),
                                    h('h2', { className: "text-5xl md:text-6xl font-bold text-white tracking-[0.2em] text-center" }, result.name),
                                    h('div', { className: "space-y-4" },
                                        h('p', { className: "text-sm text-white italic font-light tracking-[0.5em] opacity-90 text-center" }, result.sub),
                                        h('div', { className: "flex justify-center gap-3" },
                                            h('span', { className: "px-4 py-1.5 bg-white text-[10px] font-bold uppercase tracking-widest rounded-full shadow-lg", style: { color: result.theme } }, "原型匹配度 98.7%")
                                        )
                                    )
                                )
                            ),
                            h('div', { className: "px-6 -mt-10 relative z-20" },
                                h('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-6 bg-white p-8 border border-[#dcd8cf] rounded-3xl shadow-2xl items-center mb-8" },
                                    h('div', { className: "space-y-4 text-left" },
                                        h('h4', { className: "text-[11px] font-bold border-b pb-2 text-[#3a3833] opacity-60 uppercase tracking-widest" }, "叙事基因分析 / ANALYSIS"),
                                        h('div', { className: "space-y-3 text-[10px]" },
                                            h('div', { className: "flex justify-between items-center text-gray-400 uppercase" },
                                                h('span', null, "批判逻辑"),
                                                h('div', { className: "w-24 h-1 bg-gray-100" }, h('div', { className: "h-full", style: { width: result.stats[0] + "%", backgroundColor: result.theme } }))
                                            ),
                                            h('div', { className: "flex justify-between items-center text-gray-400 uppercase" },
                                                h('span', null, "智性深度"),
                                                h('div', { className: "w-24 h-1 bg-gray-100" }, h('div', { className: "h-full", style: { width: result.stats[1] + "%", backgroundColor: result.theme } }))
                                            ),
                                            h('div', { className: "flex justify-between items-center text-gray-400 uppercase" },
                                                h('span', null, "审美强度"),
                                                h('div', { className: "w-24 h-1 bg-gray-100" }, h('div', { className: "h-full", style: { width: result.stats[2] + "%", backgroundColor: result.theme } }))
                                            )
                                        )
                                    ),
                                    h('div', { className: "aspect-square w-full max-w-[180px] mx-auto" }, h('canvas', { ref: radarCanvas }))
                                ),
                                h('div', { className: "p-10 bg-white border border-[#dcd8cf] rounded-3xl shadow-sm mb-8 space-y-6 relative overflow-hidden text-left" },
                                    h('div', { className: "flex items-center gap-3 border-b border-gray-50 pb-4" },
                                        h('span', { className: "text-[11px] font-bold uppercase tracking-[0.3em] text-[#3a3833] opacity-60" }, "文学史回响 / CONTEXT")
                                    ),
                                    h('p', { className: "text-[13px] text-[#6d6b64] leading-[2.2] text-justify tracking-wide italic" }, result.bio)
                                ),
                                h('div', { className: "relative p-10 bg-white border border-[#dcd8cf] text-center rounded-3xl shadow-sm mb-8" },
                                    h('p', { className: "text-xl md:text-2xl leading-[1.8] font-medium italic mb-6 text-center" }, h('span', { className: "highlight-yellow" }, "“" + result.quote + "”")),
                                    h('div', { className: "text-[10px] text-[#a4c29b] tracking-widest uppercase font-bold text-center" }, "— " + result.name + " —")
                                ),
                                h('div', { className: "space-y-12 px-2 text-left" },
                                    h('section', { className: "space-y-4" },
                                        h('h4', { className: "text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-[#3a3833] opacity-60" }, "精神原色 / THE SELF"),
                                        h('div', { className: "bg-white p-8 border-l-4 space-y-6", style: { borderColor: result.theme } },
                                            h('p', { className: "text-[14px] leading-relaxed text-[#6d6b64] italic" }, "“" + result.identity + "”"),
                                            h('p', { className: "text-[14px] leading-relaxed font-light" }, result.longDesc)
                                        )
                                    ),
                                    h('section', { className: "space-y-4 text-left" },
                                        h('h4', { className: "text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-[#3a3833] opacity-60" }, "精神母题与当代图景 / MOTIF & ECHO"),
                                        h('div', { className: "grid grid-cols-1 gap-6 text-[13px]" },
                                            h('div', { className: "p-6 bg-gray-50 border border-gray-100 rounded text-left" },
                                                h('div', { className: "font-bold mb-2 opacity-60 uppercase text-[10px]" }, "灵魂叙事母题"),
                                                h('div', { className: "opacity-80 leading-relaxed italic" }, result.motif)
                                            ),
                                            h('div', { className: "p-6 bg-blue-50 bg-opacity-30 border border-blue-100 rounded text-left" },
                                                h('div', { className: "font-bold mb-2 opacity-60 uppercase text-[10px]" }, "当代生活样本"),
                                                h('div', { className: "opacity-80 leading-relaxed" }, result.echo)
                                            )
                                        )
                                    ),
                                    h('section', { className: "space-y-4 text-left" },
                                        h('h4', { className: "text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-red-800 opacity-60" }, "核心焦虑与盲区"),
                                        h('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-4 text-[13px]" },
                                            h('div', { className: "p-6 bg-red-50 border border-red-100 rounded text-left" },
                                                h('div', { className: "font-bold mb-2 opacity-60 uppercase text-[10px]" }, "主导焦虑"),
                                                h('div', { className: "opacity-80 text-red-900" }, result.anxiety)
                                            ),
                                            h('div', { className: "p-6 bg-gray-50 border border-gray-100 rounded text-left" },
                                                h('div', { className: "font-bold mb-2 opacity-60 uppercase text-[10px]" }, "阴影面"),
                                                h('div', { className: "opacity-70" }, result.shadow)
                                            )
                                        )
                                    ),
                                    h('section', { className: "space-y-6 text-left" },
                                        h('h4', { className: "text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-[#3a3833] opacity-60" }, "灵魂处方 / PRESCRIPTION"),
                                        h('div', { className: "grid gap-4" },
                                            result.books.map((book, i) => 
                                                h('div', { key: i, className: "bg-white p-6 border border-[#dcd8cf] rounded-xl shadow-sm text-left" },
                                                    h('h5', { className: "text-[16px] font-bold mb-1" }, book.title),
                                                    h('p', { className: "text-[10px] text-[#a4c29b] font-bold mb-3 uppercase" }, "作者: " + book.author),
                                                    h('p', { className: "text-[13px] text-[#6d6b64] italic leading-relaxed opacity-80" }, book.desc)
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                        ),
                        h('div', { className: "pt-8 space-y-4 text-center px-4" },
                            h('button', { onClick: saveAsImage, disabled: isSaving, className: "w-full py-6 bg-black text-white text-[11px] font-bold uppercase tracking-[0.6em] shadow-2xl active:scale-95 transition-all rounded-2xl" }, isSaving ? "正在生成中..." : "保存手稿报告 / SAVE REPORT"),
                            h('button', { onClick: handleRestart, className: "w-full py-6 border border-[#3a3833] text-[#3a3833] text-[11px] font-bold uppercase tracking-[0.6em] hover:bg-[#3a3833] hover:text-white transition-all rounded-2xl" },
                                h('span', null, " 再次校准原型")
                            )
                        )
                    ),
                    h('footer', { className: "mt-16 pt-16 border-t border-[#dcd8cf] text-center space-y-4" },
                        h('p', { className: "text-[10px] tracking-[0.6em] uppercase text-[#3a3833] font-bold opacity-60" }, "© 2026 CURATED BY @云树CLOUDTREE")
                    )
                );
            }
            return null;
        }

        window.addEventListener('DOMContentLoaded', () => {
            try {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(h(App));
            } catch (err) {
                console.error("Render failed:", err);
                document.body.innerHTML = '<div style="padding:40px; text-align:center; font-family:sans-serif;">系统初始化失败，请尝试刷新页面。</div>';
            }
        });
    </script>
</body>
</html>
