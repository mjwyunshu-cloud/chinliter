    <style>
        :root { --bg-color: #f2f0e9; --text-main: #3a3833; }
        body {
            font-family: 'Noto Serif SC', serif;

<body>
    <div id="loading-screen">

    <script>
        const { useState, useEffect, useRef, createElement: h } = React;

        const WRITER_DATA = {
            "鲁迅": { theme: "#b91c1c", secondary: "#1a1a1a", sub: "拒绝麻木的审视者", status: "启蒙者 / 骨相嶙峋", tags: ["国民性解剖", "铁屋呐喊"], quote: "横眉冷对千夫指，俯首甘为孺子牛。", stats: [98, 70, 40, 60, 95], identity: "你对平庸的妥协持有生理性的敌意。相比于模糊的幸福，你更尊重清醒的痛感。", bio: "中国现代文学的开山鼻祖。他解剖民族潜意识，撕开伪善温情，在绝望中确立清醒者的尊严。", motif: "绝望的反抗：在困局中，由于洞察真相而不得不发出的呐喊。对他而言，沉默即是参与谋杀。", echo: "你是那个能一眼识破话术泡沫的人。你无法融入廉价的乐观，你的‘毒舌’背后是对生命极致纯正性的洁癖。", anxiety: "害怕由于大众的麻木而导致坚持的真理变成一场噪音。", shadow: "极度的批判主义可能演化为对他人及对自己的一种‘精神性自虐’。", longDesc: "你的人生是持续的自我献祭。你拒绝任何安抚，认为只有痛感才是确认生命主体性的证据。", books: [{title: "《野草》", author: "鲁迅", desc: "生命在死火与焦土上的自我拉扯。"}] },
            "张爱玲": { theme: "#4338ca", secondary: "#1e1b4b", sub: "华丽废墟的守望者", status: "洞察者 / 苍凉底色", tags: ["海派传奇", "世俗物哀"], quote: "生命是一袭华丽的袍，爬满了蚤子。", stats: [50, 95, 85, 45, 65], identity: "你在极度琐碎里发现了命运的不可抗力。你迷恋精致，但更洞穿精致背后的腐朽。", bio: "现代文学史上最清醒的异类。专攻人性深处的自私与尴尬，在华丽中捕捉腐朽，将世俗悲剧推向极致。", motif: "文明荒原：在时代废墟折痕里，捕捉一抹带有霉味的精致感。认为人的情感本质上是基于自私的收留。", echo: "你是那个在热闹聚会中突然感到一阵寒意的人。你看穿了物质堆砌出来的虚假体面。", anxiety: "害怕由于平庸的生活消磨掉最后一丝灵气。", shadow: "过度的清醒导致了对他人的极度疏离，容易陷入一种自怨自艾的虚无。", longDesc: "你有一双洞穿繁华的冷眼。你记录那些在欲望博弈中逐渐枯萎的灵魂。你认为真实即是苍凉。", books: [{title: "《传奇》", author: "张爱玲", desc: "旧梦折痕里最真实的人性博弈。"}] },
            "沈从文": { theme: "#0891b2", secondary: "#164e63", sub: "流水与人性的纪录者", status: "造梦人 / 自然原力", tags: ["湘西神话", "人性本真"], quote: "我爱过一个正当最好年龄的人。", stats: [40, 60, 95, 80, 55], identity: "你在物质文明的噪音中礼赞原始人性。你坚信自然的法则高于社会的逻辑。", bio: "来自湘西的文学赤子。白描笔法构建了未经污染的人性圣殿，礼赞原始生命力的纯粹与哀伤。", motif: "自然的秩序：流水带走野花，藏着宇宙最丰饶的真相。认为人性应如植物般无声生长。", echo: "在内卷时代，你是那个向往‘归园田居’的人。你对他人的善意不带功利，具有神性守望感。", anxiety: "害怕现代文明粉碎人性最后温润的角落。", shadow: "过度的自然主义可能导致对现实社会残酷竞争的被动逃避，显得柔弱。", longDesc: "你迷恋自然的纯粹。文学应是对情感自然的敬畏与描摹。你眼中的人带着土地的神性。", books: [{title: "《边城》", author: "沈从文", desc: "在湘西烟雨中寻找未被污染的灵魂。"}] },
            "钱钟书": { theme: "#0f766e", secondary: "#134e4a", sub: "围城外的智性审视者", status: "冷眼人 / 智性巅峰", tags: ["博通中外", "围城困局"], quote: "城外的人想冲进去，城里人想出来。", stats: [65, 98, 55, 85, 50], identity: "你追求绝对智性。你用嘲弄作为防御，对抗这个世界的愚昧。", bio: "博通中外的视野俯视众生，对人类在欲望驱使下的尴尬表演给予了最优雅、最刻薄的注脚。", motif: "围城的逻辑：人类所有的选择都是基于对他者的误解。这种结构性荒谬是无法逃脱的循环。", echo: "你是朋友圈里那个最不屑于‘矫情’的人。你擅长解构别人的崇高感，享受博学的孤独。", anxiety: "害怕由于过于博学陷入‘书斋困局’，成为一个无法行动的旁观者。", shadow: "智性的快感可能掩盖了对生命真实温度的感知，显得过于傲慢。", longDesc: "你享受智力的博弈。文学是充满反讽的游乐场。你在荒诞的人间建立起一套逻辑避难所。", books: [{title: "《围城》", author: "钱钟书", desc: "现代人精神尴尬与结构性困局的启示录。"}] },
            "王小波": { theme: "#1d4ed8", secondary: "#1e3a8a", sub: "智性趣味的自由者", status: "理侠 / 逻辑之美", tags: ["反抗愚昧", "有趣灵魂"], quote: "一辈子很长，要找个有趣的人在一起。", stats: [85, 98, 70, 95, 60], identity: "你用逻辑消解一切‘崇高’。在你看来，‘有趣’是作为一个独立个体最重要的防御。", bio: "文坛最独特的自由主义者。将诗意与逻辑完美融合，以漫不经心姿态解构权力教条。智慧本身就是一种美德。", motif: "诗性的理智：用幽默作为武器去戏谑那些自命不凡的平庸。认为人除了此生，还应拥有诗意世界。", echo: "你是那个拒绝被任何‘权力教条’洗脑的人。你的自由源于对他人的不要求。", anxiety: "害怕由于群体的集体愚昧而丧失个人精神的自主性。", shadow: "智性的优越感有时会演变为冷嘲，忽视了生命沉重感。", longDesc: "你拒绝被宏大词汇绑架。你在荒谬中保持着诚实的幽默感，在无趣世界开辟自由操场。", books: [{title: "《黄金时代》", author: "王小波", desc: "用理性和有趣对抗整个时代的荒诞。"}] },
            "史铁生": { theme: "#4b5563", secondary: "#111827", sub: "生命局限的静思者", status: "静思者 / 灵魂突围", tags: ["地坛哲思", "死亡契约"], quote: "死是一个必然会降临的节日。", stats: [75, 90, 65, 50, 98], identity: "你在废墟上思考生存。你承认肉身的局限，但你通过思想完成了对宿命的突围。", bio: "当代最具神性的作家。他在地坛的残垣断壁间完成了对存在意义的终极追问。活成了时代的精神坐标。", motif: "宿命的和解：在必然局限中，通过自我拷问，创造出无限宽广、安静的精神空间。", echo: "面对人生的低谷，你具有比常人更深沉的耐性。你不是在忍受，你是在参透。", anxiety: "害怕环境的长期禁锢，丧失了与外部宇宙建立连接的能力。", shadow: "深度的哲思使你显得与当下快节奏生活格格不入。", longDesc: "你承认人生的荒芜。你与死亡达成默契，获得了生的宁静。文学是对生命意义的救赎。", books: [{title: "《我与地坛》", author: "史铁生", desc: "关于生存、残缺与永恒的终极对谈。"}] },
            "萧红": { theme: "#7c3aed", secondary: "#4c1d95", sub: "呼兰河畔的漂泊灵性", status: "漂泊者 / 野生灵性", tags: ["东北荒野", "洛神遗风"], quote: "那是呼兰河传，那是我的小城故事。", stats: [70, 45, 90, 98, 75], identity: "你有野生的直觉。你的灵魂是一场永不停歇的迁徙。", bio: "天才的‘文学洛神’。一生是仓皇出逃，文字是对阵痛最敏锐捕捉。生命粗砺如泥，却透着神辉。", motif: "生死场上的颤动：人类卑微且顽强地生灭，野性是文学本质。认为痛苦源于灵魂太丰盈。", echo: "在安稳生活中，你总感到莫名的‘无家可归感’。你讨厌按部就班，渴望旷野。", anxiety: "害怕定居丧失灵魂中最宝贵的野生感。", shadow: "极度漂泊感使人生在现实层面无法落脚，显得极其脆弱且难以捉摸。", longDesc: "你在荒凉岁月里赤脚行走。生命是无终点的迁徙。你的文字充满了原始战栗感。", books: [{title: "《呼兰河传》", author: "萧红", desc: "勾勒人类生灭的原始长卷。"}] },
            "曹雪芹": { theme: "#ca8a04", secondary: "#713f12", sub: "大观园的织梦人", status: "织梦人 / 繁华幻灭", tags: ["红楼梦", "东方挽歌"], quote: "质本洁来还洁去，强于污淖陷渠沟。", stats: [40, 80, 98, 45, 90], identity: "你洞穿了万物覆灭，依然沉醉于记录那一抹华丽。你是美的最后陪葬者。", bio: "中国古典文学高峰。在幻梦中预演了文明的整体覆灭，将生命美学总结至终极高度。", motif: "美的悼词：质本洁来还洁去。认为极致美必然与幻灭共生，文学是对必逝之物的留存。", echo: "你极其注重生活仪式感。对权力的争夺感到厌倦，更愿在字里行间构建自己的‘大观园’。", anxiety: "害怕心中那块‘洁白’被俗世的欲望彻底染成肮脏，害怕美被践踏。", shadow: "透彻宿命感导致你在现实生活中缺乏进取心。", longDesc: "你在字里行间构建幻梦。你坚信美是荒唐世界唯一的救赎。你试图挽留注定逝去的余晖。", books: [{title: "《红楼梦》", author: "曹雪芹", desc: "东方文明的美学终结与生命祭奠。"}] },
            "林徽因": { theme: "#be185d", secondary: "#701a75", sub: "纯净审美的构建者", status: "建筑师 / 纯净审美", tags: ["理性结构", "四月天"], quote: "你是人间的四月天，笑响点亮了四面风。", stats: [35, 75, 50, 55, 95], identity: "你在秩序与感性间寻找平衡。你认为审美是人最后的尊严。", bio: "动荡时代建筑师。用理性框架支撑审美圣殿。追求词藻纯正与精神轻盈。", motif: "废墟上的优雅：审美是人在动荡下的避难所，用优雅秩序构建内心的理想国。", echo: "你是那个在杂乱环境中也要摆上一束花的人。你追求一种具有智性高度的、克制的深情。", anxiety: "害怕外部世界的丑陋会彻底毁灭掉你内心的宁静圣殿。", shadow: "过度追求高级，可能会导致你无法直视人性中必然存在的脓疮。", longDesc: "你守护审美，认为那是人的尊严。你一生在试图将破碎的感性，缝补进理性的结构。", books: [{title: "《你是人间的四月天》", author: "林徽因", desc: "在理性与感性间捕捉理想的微光。"}] },
            "老舍": { theme: "#92400e", secondary: "#451a03", sub: "平民脊梁的守望者", status: "守望者 / 平民脊梁", tags: ["北京地域", "市民宿命"], quote: "活着，这就是生活。", stats: [65, 70, 60, 55, 85], identity: "你扎根于大地的泥土。你对平凡人的尊严持有深刻同情。你认为‘体面’是最后的骨气。", bio: "京派大师。扎根胡同尘土写出民族魂魄史诗。在幽默下深藏文明崩塌的悲痛。", motif: "体面的脆弱：文明消失往往始于一个平凡人的无声崩裂。所有的幽默本质上是含泪自嘲。", echo: "你是那个在琐碎生活中追求‘讲究’的人。你对烟火气有天然亲近感，在乎普通人命运。", anxiety: "害怕传统文明根基彻底断裂，害怕温情的人际关系变质。", shadow: "过度的克制让你显得对外部冲突缺乏热量，过于旁观。", longDesc: "你在幽壳下记录平民尊严。记录正在消失的文明，记录那些车轮下想站稳的人。", books: [{title: "《四世同堂》", author: "老舍", desc: "民族魂魄的微观史诗，记录动荡下的尊严。"}] },
            "三毛": { theme: "#ea580c", secondary: "#7c2d12", sub: "流浪的存在主义者", status: "实验员 / 浪漫流浪", tags: ["撒哈拉", "绝对自由"], quote: "如果你给我的，和你给别人的一样，那我就不要了。", stats: [88, 45, 75, 98, 65], identity: "你将生命过成实验。在不断行走中发明‘自我’。认为远方才是唯一的归宿。", bio: "拒绝被定义。文字是狂风沙与烈火，唤醒整整一代人对自由的原始渴望。", motif: "身份在路上：自由是灵魂唯一燃料。身份是在拒绝平庸的定居过程中创造出来的。", echo: "你是那个会在深夜突然买票飞向异乡的人。你讨厌标签，如果你不爱，你会跑得很快。", anxiety: "害怕被任何人、任何一段关系定义，会产生生理性束缚感。", shadow: "极致自我中心可能导致与真实社会严重脱节。", longDesc: "你拒绝平庸. 文字带有异域狂风. 你在远方寻找姓名，用一生抗拒灵魂枯萎。", books: [{title: "《撒哈拉的故事》", author: "三毛", desc: "对自由最赤裸、最热烈的灵魂呼唤。"}] },
            "余华": { theme: "#1e293b", secondary: "#020617", sub: "苦难底色的生存者", status: "见证者 / 生存底色", tags: ["苦难叙事", "活着意志"], quote: "活着，活着本身就是唯一的理由。", stats: [75, 85, 50, 60, 98], identity: "你剥离了廉价感伤。在极端苦难前，人唯一的尊严就是忍受。活着是庄严的大山。", bio: "当代现实主义尖兵。揭示生命本能——忍受。在他的笔下，‘活着’不再是动词。", motif: "生存即道义：剥离理想后，在苦难中耕耘的影子才是真实。为了活着本身而活着。", echo: "在不确定环境中，你表现出惊人韧性. 务实，讨厌口号，在乎脚下的土地。", anxiety: "害怕生存匮乏导致人丧失基本属性，害怕人在苦难中变得麻木。", shadow: "冷静到近乎麻木的视角让你显得冷酷。建议偶尔允许自己在文字中放声大哭。", longDesc: "你用冰冷笔触书写极端痛感。关注生存本能。你是时代的见证者。", books: [{title: "《活着》", author: "余华", desc: "生存意志的最强音，对生命本能的最后致敬。"}] },
            "莫言": { theme: "#991b1b", secondary: "#450a0a", sub: "民间幻象的通灵者", status: "通灵者 / 大地幻象", tags: ["魔幻现实", "高密原力"], quote: "生死疲劳，从荒原到幻象。", stats: [85, 55, 95, 65, 80], identity: "你将民间粗砺升华为绚烂幻觉。你相信土地下藏着原始欲望。", bio: "诺奖作家。民间荒诞编织成宏大魔幻现实。挖掘被格式化外的民族元神。", motif: "轮回的幻象：权力叙事下，大地的欲望、牺牲才是永恒。", echo: "你想象力极丰，甚至有些‘野性’。对规矩感到压抑，喜欢在直觉世界横冲直撞。", anxiety: "害怕土地原始的生命力会被现代技术或逻辑彻底格式化。", shadow: "血腥与狂想的交织有时使表达过于感官过载。", longDesc: "你的叙事带有野性。通过重构民族苦难叙事，建立起一座通往潜意识深处的地下迷宫。", books: [{title: "《生死疲劳》", author: "莫言", desc: "东方魔幻现实主义巅峰，大地灵魂的史诗。"}] },
            "金庸": { theme: "#854d0e", secondary: "#451a03", sub: "江湖秩序的重构者", status: "守望者 / 古典大义", tags: ["成人童话", "家国情怀"], quote: "侠之大者，为国为民。", stats: [75, 65, 55, 75, 92], identity: "你在成人世界编织童话。你是在为现代人构建一套古典的侠义秩序。", bio: "武侠宗师。将通俗文学提升至哲学高度。保留了华夏文明中最后的风骨。", motif: "知其不可而为之：权力阴谋中，个体的选择应基于道义责任。情义是生命底色。", echo: "在竞争激烈的社会，你可能是依然坚守‘底线’的人。相信最终的正义。", anxiety: "害怕传统侠义精神在现代功利主义前崩塌。", shadow: "过度的英雄主义可能让你忽视了现实的阴暗，容易受挫。", longDesc: "你在为社会提供另一种想象空间。文学是浪漫主义的最后阵地。", books: [{title: "《射雕英雄传》", author: "金庸", desc: "侠义精神的现代图腾。"}] },
            "丁玲": { theme: "#15803d", secondary: "#064e3b", sub: "时代漩涡中的抉择者", status: "抉择者 / 时代激荡", tags: ["女性主体", "自我解放"], quote: "人，只要有一种信念，有所追求，就能忍受。", stats: [92, 65, 55, 50, 95], identity: "你敢于在冲突中直面真实的自我。在历史阵痛中不断进化。", bio: "剧烈挣扎先锋。展现强韧主体性。拒绝被既定角色吞没。", motif: "信念的韧度：自我解放不是终点，是投身宏大进程的起点。文学应是带血的宣言。", echo: "你是那种具有极强‘存在感’的人。你会选择符合内心渴望的路，哪怕充满争议。", anxiety: "害怕由于过于关注‘小我’而丧失了对时代正义的参与感。", shadow: "投身时代的狂热掩盖了个体真实。建议关注‘细碎’。", longDesc: "你是投身的火，灼烧的铁。展现极强韧生命张力。", books: [{title: "《太阳照在桑干河上》", author: "丁玲", desc: "宏大进程中的个体阵痛与信仰重生。"}] },
            "王安忆": { theme: "#be185d", secondary: "#701a75", sub: "城市日常的织梦人", status: "织梦人 / 城市肌理", tags: ["海派传人", "弄堂逻辑"], quote: "在繁华的尘埃里，寻找人世的逻辑。", stats: [45, 90, 75, 55, 80], identity: "你迷恋细枝末节的厚度。真相藏在最细小的生存博弈之中。", bio: "最具耐性工笔画家。弄堂碎裂逻辑中缝制史诗，探讨城市精神的延续与断裂。", motif: "寻找逻辑：城市灵魂藏在琐碎细节中。通过细致描摹重塑秩序感。", echo: "你是细节控，对‘长情’和‘积累’有偏执。擅长从偶然推断必然。", anxiety: "害怕城市精神在商业化洪流中丧失人情味逻辑。", shadow: "过于绵密细节描写消解叙事爆发力。", longDesc: "你认为文学是高级工笔画。重塑叙事逻辑，让细碎光影获得不朽。", books: [{title: "《长恨歌》", author: "王安忆", desc: "上海弄堂里的情感史诗。"}] },
            "残雪": { theme: "#581c87", secondary: "#2e1065", sub: "潜意识的实验员", status: "梦游者 / 潜意识深渊", tags: ["先锋极致", "异化噩梦"], quote: "在极致的纯粹中，寻找灵魂的出口。", stats: [98, 45, 98, 85, 75], identity: "你拒绝与外部现实和解。灵魂是无法翻译的噩梦实验室。", bio: "中国最彻底先锋作家。切断文字与外部联系，专攻内部梦境。令人战栗的异类。", motif: "内部秘径：现实只是影子，文字是通向潜意识唯一的出口。异化是真实的。", echo: "你总觉得现实‘不太对劲’。你是那个会由于墙上裂缝联想到宇宙坍塌的人。", anxiety: "害怕外界频繁平庸的接触会干扰梦境纯粹性。", shadow: "彻底自我封闭使你的表达充满了孤独感。", longDesc: "你的文字是通向内部深渊的秘径。通过自我异化完成对存在的挑战。", books: [{title: "《黄泥街》", author: "残雪", desc: "开启东方先锋文学的奇诡梦境。"}] },
            "迟子建": { theme: "#0369a1", secondary: "#082f49", sub: "冰雪大地的守火者", status: "守火者 / 自然悲悯", tags: ["黑土地", "温情现实"], quote: "在寒冷的北方，灵魂也会开出温暖的花。", stats: [40, 70, 88, 92, 85], identity: "你坚信自然法则高于社会。在极寒处境中守望温存。", bio: "扎根冰雪大地的守火人。神性笔触记录民族兴衰。文字如冬夜油灯般阔大悲悯。", motif: "自然的法典：严寒中守望最后的人性善良，生命对土地的告白。", echo: "在快节奏的今天保持‘慢节奏’。你是那个会给流浪动物送暖的人。", anxiety: "害怕古老文明会被现代铁骑踏碎，害怕人性温润消失。", shadow: "过度的怀旧美化了真实苦难。显得有些温情脉脉。", longDesc: "你扎根北方边缘。通过记录微弱暖意对抗时代的寒冬。", books: [{title: "《额尔古纳河右岸》", author: "迟子建", desc: "对古老民族的绝美挽歌。"}] },
            "舒婷": { theme: "#e11d48", secondary: "#881337", sub: "独立与温柔的诗人", status: "诗人 / 独立风骨", tags: ["朦胧诗", "致橡树"], quote: "我必须是你近旁的一株木棉。", stats: [45, 65, 88, 75, 85], identity: "你拥有一种力量的温柔。强调自我独立与平视。拒绝形式的依附。", bio: "朦胧诗派核心。在理性复苏时代确立平等感性宣言。柔韧且有骨气。", motif: "拒绝攀附：我必须作为树和你站在一起。共鸣应建立在灵魂对等之上。", echo: "你是那个坚持‘对等尊重’的人。你的温柔是有边界的。", anxiety: "害怕过度情感投入丧失个体自主性，害怕变成凌霄花。", shadow: "清醒理性使你在感性瞬间显得缺乏激情。", longDesc: "文学是对人格自主的宣誓。证明深情与独立不矛盾。", books: [{title: "《致橡树》", author: "舒婷", desc: "当代情感独立精神的圣经。"}] },
            "杨绛": { theme: "#166534", secondary: "#064e3b", sub: "洗净铅华的观察家", status: "观察家 / 洁白克制", tags: ["洗炼文风", "生命智慧"], quote: "我们仨，就剩下我一个了。", stats: [35, 92, 45, 55, 90], identity: "你在平淡中见真意。力量源于内心的安静。忍受也是智慧。", bio: "文坛最宁静的声音。经历世纪波澜，用最洁白笔触记录情感。饱含智慧。", motif: "守望灯火：在喧嚣边缘守住书卷，是对时代最温柔的反抗。", echo: "你是不需要社交填补空虚的人。有一种‘隐入烟尘’的高级感。", anxiety: "害怕外部喧嚣破坏内心的专注，丧失作为个体的温情。", shadow: "过度的克制让你显得对外部冲突缺乏热量，过于旁观。", longDesc: "经历动荡选择克制。文字是记录温度的日记。你在平庸现实上建立了花园。", books: [{title: "《我们仨》", author: "杨绛", desc: "极简文字下涌动的深情。"}] }
        };

        const QUESTIONS = [
            { id: 1, text: "提起「时间」，你最先想到的中国文学意象是：", origin: "古典意境", desc: "识别生命体验的底层色彩。", reading: "《春江花月夜》", options: [
                { text: "一江春水。流走了，就再也回不来了。", target: "沈从文" },
                { text: "庭前落花。年年看着都一样，可人早变了。", target: "张爱玲" },
                { text: "寒灯夜雨。窗外滴答个没完，一晃眼就是半生。", target: "史铁生" },
                { text: "指间沙。越想攥紧，漏得越快。", target: "三毛" }
            ]},
            { id: 2, text: "面对一个在人群里独自读诗、眼神疏离的人，你的内心活动是：", origin: "行为共感", desc: "识别你对精神孤岛的同理心模型。", reading: "《围城》", options: [
                { text: "他以前也爱热热闹闹聊理想，现在只想躲在文字里歇一歇。", target: "史铁生" },
                { text: "到底是哪句话戳中了他，才愿意离周遭的热闹远一点。", target: "张爱玲" },
                { text: "他安安静静读书的样子，比身边吵吵嚷嚷的人更踏实。", target: "沈从文" },
                { text: "他是把心里的话都藏在诗里了，借着文字替自己说说而已。", target: "萧红" }
            ]},
            { id: 3, text: "写一个中国文学式的理想主义者，你会让他：", origin: "理想归宿", desc: "识别你对失败价值的终极认定。", reading: "《离骚》", options: [
                { text: "像屈子那样。宁折不弯，守着自己的那点儿初心。", target: "鲁迅" },
                { text: "像陶潜那样。看不惯这世道，就回屋种豆，自己管自己。", target: "周作人" },
                { text: "像东坡那样。跌到泥里去了，还能乐呵呵地看风景。", target: "史铁生" },
                { text: "像杜甫那样。自己日子都过不利索，还在操心天下的安稳。", target: "老舍" }
            ]},
            { id: 4, text: "你心里的「孤独」，最像下面哪种画面？", origin: "心理物象", desc: "识别灵魂的独处深度。", reading: "《孤独六讲》", options: [
                { text: "远处的一盏灯。看得见亮，可你就是走不到跟前。", target: "沈从文" },
                { text: "一个人在街上走。身边再热闹也觉得自己跟这世界没关系。", target: "三毛" },
                { text: "夜里空荡荡的房间。安静得能听见自己的心跳声。", target: "张爱玲" },
                { text: "心里有话。翻遍了通讯录，却没法跟任何人说出口。", target: "鲁迅" }
            ]},
            { id: 5, text: "一本旧书，让你想到中国文学里的哪种滋味：", origin: "物什记忆", desc: "识别你对记忆与传统的保留模型。", reading: "《写在人生边上》", options: [
                { text: "字字皆是心事。一页页翻过去，全是回不去的岁月。", target: "张爱玲" },
                { text: "如温酒慢品。这东西越旧，喝起来就越有股子醇劲儿。", target: "钱钟书" },
                { text: "像故人来访。翻开那一页，就像跟当年的自己撞了个满怀。", target: "杨绛" },
                { text: "是寒夜的炉火。那些最难熬的日子，全靠它捂着手走过来。", target: "史铁生" }
            ]},
            { id: 6, text: "关于「记忆」，你更认同下面哪句话：", options: [
                { text: "某个味道、某首歌，就能突然唤醒一整段过去。", target: "曹雪芹" },
                { text: "人这辈子，最后都会活成几段忘不掉的回忆。", target: "张爱玲" },
                { text: "有些事以为忘了，其实一直藏在心底，成了骨骼。", target: "鲁迅" },
                { text: "记忆会模糊，但当时那种心跳漏了一拍的感觉，永远不会变。", target: "沈从文" }

            { id: 7, text: "当生活压得你喘不过气，你更愿意：", options: [

                { text: "出门走一走，吹吹风，看这世界还没被毁掉的部分。", target: "周作人" },

            { id: 8, text: "你觉得真正的「自由」是：", options: [

            { id: 9, text: "面对「遗憾」，你更像哪种状态：", options: [

            { id: 10, text: "你更喜欢的相处方式，是下面哪种感觉：", options: [

            { id: 11, text: "你对「人间烟火」的理解，最贴近哪一句：", options: [

                { text: "柴米油盐虽然普通，却最能把一个人的心给治愈了。", target: "汪曾祺" },
                { text: "那股子热闹劲里藏着的温柔，才是最动人的。", target: "沈从文" },

            { id: 12, text: "当你被迫融入一个虚伪的场合，你会：", options: [

                { text: "能躲就躲，实在躲不开也绝不勉强自己合群。", target: "鲁迅" },
                { text: "安静在那看着，不跟着掺和，也不急着拆穿。", target: "林徽因" },
                { text: "礼貌把流程走完，然后找个借口赶紧溜号。", target: "杨绛" }

            { id: 13, text: "你认为一个人「成熟」最明显的标志是：", options: [

                { text: "接受了世事无常，不再非要追着老天要个结果。", target: "史铁生" },

            { id: 14, text: "你最抗拒下面哪种境遇？", options: [

                { text: "身不由己，天天被那些人情世故给绑架了。", target: "萧红" }

            { id: 15, text: "你对「爱情」最大的期待是：", options: [

                { text: "灵魂能通上电，很多话不用说出口就能心领神会。", target: "沈从文" },
                { text: "不纠缠、不消耗，给彼此留够呼吸的空地。", target: "张爱玲" }

            { id: 16, text: "当你感到迷茫得找不着北时，你会：", options: [
                { text: "先停下来，等心里的水沉静了，再决定往哪走。", target: "史铁生" },
                { text: "回头看看当初是为了啥出发的，想想原点在哪。", target: "鲁迅" },

            { id: 17, text: "在你心里，下面哪件事的分量更重？", options: [

                { text: "人生本来就是一场场告别，习惯了也就不疼了。", target: "三毛" }

            { id: 19, text: "文字对你来说，更像是一个什么样的存在？", options: [

                { text: "一个防空洞。日子太难的时候，可以躲进去待会儿。", target: "沈从文" },
                { text: "一个老朋友。它在那安静听我絮叨，从不嫌烦。", target: "周作人" },

            { id: 21, text: "面对生活的那些苦，你更倾向于：", options: [
                { text: "默默在那扛着。咬咬牙，总有天能把这些苦给熬干。", target: "余华" },

                { text: "不抱怨。只管把手头能做的事儿一件件做好。", target: "杨绛" },

            ]},
            { id: 22, text: "你最向往的生活状态，更接近哪种画面？", options: [
                { text: "简单清净。谁也别来打扰我，我就守着自己的小日子。", target: "周作人" },
                { text: "安稳有序。每天平平淡淡、踏踏实实的，心里就有底。", target: "老舍" },
                { text: "自由随性。想干啥就干啥，随心所欲，不受那份累。", target: "三毛" },
                { text: "充实安静。心里有个自己的小世界，那儿挺好。", target: "沈从文" }
            ]},
            { id: 23, text: "你对「讨好别人」这件事的真实看法是：", options: [
                { text: "绝不低头。宁愿一个人待着，也绝不委屈自己去凑合。", target: "鲁迅" },
                { text: "偶尔应付。但这只是社交需要，我绝不会丢了魂。", target: "钱钟书" },
                { text: "没必要。懂你的人不用讨好，不懂的人讨好也没用。", target: "王小波" },
                { text: "不想勉强。但也尽量别让场面太难看，大家都体面。", target: "林徽因" }
            ]},
            { id: 24, text: "你觉得「自我」这两个字里，最重要的是：", options: [
                { text: "不迷失。别跟着这股浪潮乱跑，得守住主见。", target: "鲁迅" },
                { text: "守底线。心里得有那根不可触碰的高压线。", target: "史铁生" },
                { text: "保清醒。时刻知道自己在干嘛，别给世界当了零件。", target: "王小波" },
                { text: "接纳。哪怕现在的我不完美，我也认这个账。", target: "沈从文" }
            ]},
            { id: 25, text: "当你被身边的人误解、看错时，你会：", options: [
                { text: "懒得解释。懂的人一眼就懂，不懂的说破嘴皮子也白搭。", target: "钱钟书" },
                { text: "心里肯定堵得慌。但不会去跟谁争辩，随它去吧。", target: "杨绛" },
                { text: "交给时间。日子久了是非曲直总会明了，急不来。", target: "史铁生" },
                { text: "淡淡一笑。既然不是同路人，你的看法对我没分量。", target: "张爱玲" }
            ]},
            { id: 26, text: "你对「未来」的真实态度更偏向于：", options: [
                { text: "不焦虑，也不瞎期待。顺其自然，该来的总会来。", target: "史铁生" },
                { text: "认真过好现在的每一分钟。未来就在这些分钟里长出来。", target: "杨绛" },
                { text: "有点小期待。但如果结果没成，我也不强求。", target: "沈从文" },
                { text: "不怕那个未知。只管埋头往前走，路就在脚底下。", target: "鲁迅" }
            ]},
            { id: 27, text: "你最容易被下面哪种东西给打动？", options: [
                { text: "真诚的善意。那是不刻意、不做作的，最暖人心。", target: "老舍" },
                { text: "安静的陪伴。那种无声的守护，最长情。", target: "杨绛" },
                { text: "真实的脆弱。那是不伪装、不逞强的，最动人。", target: "萧红" },
                { text: "生活里那些不起眼的小温柔。一两句贴心话就够了。", target: "汪曾祺" }
            ]},
            { id: 28, text: "你对「合群」这件事的看法是：", options: [
                { text: "不合群也没啥。自己待着舒服最重要，别难为自己。", target: "鲁迅" },
                { text: "低质量的社交。这真不如高质量的独处，省心。", target: "钱钟书" },
                { text: "不必强求。如果圈子不喜欢，那我就撤，没必要凑合。", target: "王小波" },
                { text: "偶尔合群。但大多数时候，我还是想跟自己待会儿。", target: "张爱玲" }
            ]},
            { id: 29, text: "如果非要选一个意象来代表你的人生，你想活成：", options: [
                { text: "一棵树。安静地在那扎根，风吹雨打也动不了根本。", target: "史铁生" },
                { text: "一阵风。自由随性，去哪都行，谁也别想把我抓手里。", target: "三毛" },
                { text: "一盏灯。内心透亮，不仅照亮自己，也能给别人暖意。", target: "林徽因" },
                { text: "一本书。沉静有深度，等着那个对的人慢慢读懂我。", target: "杨绛" }
            ]},
            { id: 30, text: "最后，你认为人生这一辈子最重要的事是：", options: [
                { text: "忠于自己。这辈子活得舒坦、自在，不违心。", target: "鲁迅" },
                { text: "内心安宁。不管外面怎么乱，心里得稳得住。", target: "史铁生" },
                { text: "真实坦荡。不辜负这份生命，活出个人样儿来。", target: "王小波" },
                { text: "平安健康。有个平淡的小幸福，这就够了。", target: "老舍" }
            ]}
        ];

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [scores, setScores] = useState({});
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [selectedWriter, setSelectedWriter] = useState("鲁迅");
            const [code, setCode] = useState("");
            const [showCodeError, setShowCodeError] = useState(false);
            
            const radarCanvas = useRef(null);
            const captureRef = useRef(null);
            const chartRef = useRef(null);

            useEffect(() => {
                const loader = document.getElementById('loading-screen');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            }, []);

            const handleVerify = () => {
                if (code.toLowerCase().trim() === "qwert") setStep('quiz');
                else { setShowCodeError(true); setTimeout(() => setShowCodeError(false), 500); }
            };

            const handleAnswer = (target) => {
                const newScores = { ...scores, [target]: (scores[target] || 0) + 1 };
                setHistory([...history, { scores, currentQuestion }]);
                setScores(newScores);
                if (currentQuestion < QUESTIONS.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    const maxScore = Math.max(...Object.values(newScores));
                    const candidates = Object.keys(newScores).filter(name => (newScores[name] || 0) === maxScore);
                    const topWriterName = candidates[Math.floor(Math.random() * candidates.length)] || "鲁迅";
                    setResult(Object.assign({}, WRITER_DATA[topWriterName], { name: topWriterName }));
                    setStep('result');
                    window.scrollTo(0, 0);
                }
            };

            const handleBack = () => {
                if (history.length > 0) {
                    const last = history[history.length - 1];
                    setScores(last.scores); setCurrentQuestion(last.currentQuestion);
                    setHistory(history.slice(0, -1));
                } else setStep('welcome');
            };

            const handleRestart = () => {
                setStep('welcome'); setCurrentQuestion(0); setScores({}); setHistory([]); setResult(null); setCode("");
                window.scrollTo(0, 0);
            };

            const saveAsImage = async () => {
                if (typeof html2canvas === 'undefined') return;
                setIsSaving(true);
                try {
                    const canvas = await html2canvas(captureRef.current, { scale: 2, backgroundColor: "#f2f0e9", useCORS: true });
                    const link = document.createElement('a');
                    link.download = `灵魂手稿-${result.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (err) { console.error(err); }
                setIsSaving(false);
            };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current && typeof Chart !== 'undefined') {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = radarCanvas.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['批判逻辑', '智性深度', '审美强度', '自由意志', '精神韧性'],
                            datasets: [{ data: result.stats, backgroundColor: result.theme + "22", borderColor: result.theme, borderWidth: 2, pointRadius: 0 }]
                        },
                        options: { scales: { r: { angleLines: { display: false }, grid: { color: 'rgba(0,0,0,0.05)' }, pointLabels: { font: { size: 9, family: 'Noto Serif SC', weight: 'bold' } }, ticks: { display: false }, min: 0, max: 100 } }, plugins: { legend: { display: false } } }
                    });
                }
            }, [step, result]);

            const dossier = WRITER_DATA[selectedWriter];

            const AbstractNode = ({ name, isActive, onClick }) => {
                return h('g', { className: "abstract-node", onClick: onClick },
                    h('rect', { x: "0", y: "0", width: "40", height: "70", fill: "transparent" }),
                    h('circle', { cx: "20", cy: "15", r: "3.5", fill: isActive ? "#35afcb" : "#3a383344" }),
                    h('path', { d: "M20 18.5 Q22 28 18 38", stroke: isActive ? "#35afcb" : "#3a383344", strokeWidth: "2", fill: "none", strokeLinecap: "round" }),
                    h('path', { d: "M19 25 L32 18", stroke: isActive ? "#35afcb" : "#3a383344", strokeWidth: "1.2", fill: "none", strokeLinecap: "round" }),
                    h('path', { d: "M18 38 L10 48 L22 52", stroke: isActive ? "#35afcb" : "#3a383344", strokeWidth: "1.2", fill: "none", strokeLinecap: "round" }),
                    h('text', { x: "20", y: "65", textAnchor: "middle", fontSize: "9", fill: isActive ? "#3a3833" : "#3a383333", fontWeight: isActive ? "bold" : "normal" }, name)
                );
            };

            if (step === 'welcome') {
                return h('div', { className: "max-w-xl mx-auto px-4 py-8 relative animate-fade-in" },
                    h('div', { className: "text-center space-y-8" },
                        h('div', { className: "flex justify-between items-start pt-4" },
                            h('div', { className: "inline-block px-2 py-0.5 bg-[#3a3833] text-[#f2f0e9] text-[8px] tracking-widest font-sans uppercase" }, "ARCHETYPE ARCHIVE"),
                            h('div', { className: "text-[8px] opacity-30 font-bold uppercase tracking-widest" }, "NO. 2026 / SYSTEM 01")
                        ),
                        h('div', { className: "text-left" },
                            h('h1', { className: "text-4xl md:text-5xl font-black tracking-[0.1em] text-[#3a3833]" }, "认领你的", h('span', { className: "highlight-yellow ml-2" }, "文学原型")),
                            h('p', { className: "mt-4 text-[9px] text-gray-400 tracking-[0.4em] uppercase font-bold tracking-widest" }, "LITERARY NARRATIVE SYSTEM")
                        ),
                        h('div', { className: "w-full relative py-4" },
                            h('svg', { viewBox: "0 0 360 320", className: "w-full h-full drop-shadow-sm", style: { touchAction: 'manipulation' } },
                                h('ellipse', { cx: 180, cy: 160, rx: 140, ry: 120, fill: "none", stroke: "#3a3833", strokeWidth: "0.5", strokeDasharray: "4 4", opacity: "0.1" }),
                                h('g', { transform: "translate(130, 120)", opacity: "0.08", style: { mixBlendMode: 'multiply' } },
                                    h('path', { d: "M10 40 Q 30 10 70 35 Q 90 60 50 80 Q 20 70 10 40", fill: "#a4c29b" }),
                                    h('path', { d: "M25 45 Q 45 15 85 40 Q 105 65 65 85", fill: "#35afcb" })
                                ),
                                Object.keys(WRITER_DATA).map((name, i) => {
                                    const angle = (i / 20) * Math.PI * 2 - Math.PI / 2;
                                    const x = 180 + Math.cos(angle) * 140;
                                    const y = 160 + Math.sin(angle) * 120;
                                    return h('g', { key: name, transform: `translate(${x - 20}, ${y - 30})` },
                                        h(AbstractNode, { name, isActive: selectedWriter === name, onClick: () => setSelectedWriter(name) })
                                    );
                                })
                            ),
                            h('div', { className: "absolute top-[5%] right-0 bg-white px-3 py-1.5 rounded-sm shadow-xl border border-[#dcd8cf] transform rotate-3 max-w-[120px] z-20 pointer-events-none" },
                                h('p', { className: "text-[9px] text-[#3a3833] leading-tight font-bold italic" }, "“点击名字，", h('br'), "提取绝密档案。”")
                            )
                        ),
                        h('div', { className: "border-t-2 border-[#3a3833] pt-8 text-left space-y-6" },
                            h('div', { className: "flex justify-between items-end" },
                                h('div', { className: "space-y-1" },
                                    h('h2', { className: "text-4xl font-bold tracking-widest text-[#3a3833]" }, selectedWriter),
                                    h('p', { className: "text-[10px] font-bold text-[#35afcb] uppercase tracking-[0.2em]" }, dossier.status)
                                ),
                                h('div', { className: "flex gap-2" }, dossier.tags.map(t => h('span', { key: t, className: "text-[8px] border border-[#dcd8cf] px-1.5 py-0.5 opacity-50 font-bold" }, "#" + t)))
                            ),
                            h('div', { className: "space-y-4" },
                                h('p', { className: "text-[12px] leading-[1.8] text-[#6d6b64] text-justify font-light" }, dossier.bio),
                                h('div', { className: "space-y-1.5" },
                                    h('h4', { className: "text-[9px] font-bold uppercase tracking-widest opacity-30 flex items-center gap-2" }, h('div', { className: "w-3 h-[1px] bg-black" }), " 精神坐标 / IDENTITY"),
                                    h('p', { className: "text-[12px] leading-relaxed text-[#3a3833] italic bg-white bg-opacity-50 p-3 border-l-2 border-[#e8ed2a]" }, dossier.identity)
                                )
                            )
                        ),
                        h('div', { className: "space-y-8 pt-8" },
                            h('div', { className: "space-y-4 " + (showCodeError ? 'shake-ani' : '') },
                                h('div', { className: "flex flex-col items-center gap-2" },
                                    h('span', { className: "text-[10px] uppercase tracking-[0.3em] opacity-40 font-bold" }, "通行码认证 / ACCESS CODE"),
                                    h('input', { type: "text", value: code, onChange: (e) => setCode(e.target.value), className: "redeem-input w-48 py-2 text-sm text-center", placeholder: "请输入通行码解锁测试" })
                                )
                            ),
                            h('button', { onClick: handleVerify, className: "w-full py-7 bg-[#3a3833] text-white text-[12px] tracking-[0.8em] font-bold shadow-2xl active:scale-95 transition-all" }, "开启漫游 / ENTER"),
                            h('div', { className: "text-[10px] text-gray-400 tracking-[0.3em] pb-12" }, "Designed by @云树cloudtree")
                        )
                    )
                );
            }

            if (step === 'quiz') {
                const q = QUESTIONS[currentQuestion];
                return h('div', { className: "max-w-xl mx-auto px-4 py-8 relative animate-fade-in" },
                    h('div', { className: "space-y-10 text-center py-6" },
                        h('div', { className: "flex justify-between items-center border-b border-[#dcd8cf] pb-4" },
                            h('button', { onClick: handleBack, className: "flex items-center gap-1 text-[10px] uppercase opacity-40 hover:opacity-100 transition-all font-bold tracking-widest" }, "BACK"),
                            h('span', { className: "text-[9px] uppercase text-[#6d6b64] font-black tracking-widest opacity-40" }, "DECISION " + String(currentQuestion + 1).padStart(2, '0') + " / " + QUESTIONS.length),
                            h('div', { className: "w-10" })
                        ),
                        h('div', { className: "min-h-[160px] flex flex-col items-center justify-center px-4 space-y-6" },
                            h('div', { className: "w-full text-left bg-[#3a383308] p-5 border-l-4 border-[#3a383333]" },
                                h('div', { className: "flex items-baseline gap-2 mb-2" },
                                    h('span', { className: "text-[10px] font-bold bg-[#3a3833] text-white px-1.5 py-0.5" }, "叙事背景"),
                                    h('span', { className: "text-[12px] font-bold opacity-80" }, q.origin)
                                ),
                                h('p', { className: "text-[11px] leading-relaxed opacity-60 italic mb-2" }, q.desc),
                                q.reading && h('div', { className: "flex items-baseline gap-2" },
                                    h('span', { className: "text-[8px] font-bold border border-[#3a383333] px-1.5 py-0.5 uppercase opacity-50" }, "扩展阅读"),
                                    h('span', { className: "text-[10px] opacity-40 font-medium" }, q.reading)
                                )
                            ),
                            h('h2', { className: "text-[18px] md:text-[21px] font-normal leading-[1.8] text-[#3a3833] text-justify border-t border-[#dcd8cf] pt-6" }, q.text)
                        ),
                        h('div', { className: "space-y-4 text-left" },
                            q.options.map((option, idx) => 
                                h('button', { key: idx, onClick: () => handleAnswer(option.target), className: "w-full p-6 bg-white bg-opacity-70 rounded-sm border border-[#dcd8cf] hover:border-[#3a3833] transition-all group active:bg-white text-left shadow-sm" },
                                    h('span', { className: "text-[15px] text-[#6d6b64] group-hover:text-[#3a3833] leading-relaxed pr-4" }, option.text)
                                )
                            )
                        ),
                        h('div', { className: "pt-6 flex justify-center" },
                            h('div', { className: "h-[1px] w-full bg-[#dcd8cf] relative opacity-50" },
                                h('div', { className: "h-full bg-[#3a3833] transition-all duration-700", style: { width: ((currentQuestion + 1) / QUESTIONS.length * 100) + "%" } })
                            )
                        )
                    )
                );
            }

            if (step === 'result' && result) {
                return h('div', { className: "max-w-xl mx-auto px-4 py-8 relative animate-fade-in" },
                    h('div', { className: "space-y-8 pb-12" },
                        h('div', { ref: captureRef, className: "pb-12 bg-[#f2f0e9] overflow-hidden rounded-2xl result-card relative text-left" },
                            h('div', { className: "p-12 text-center relative overflow-hidden", style: { background: "linear-gradient(135deg, " + result.theme + ", " + result.secondary + ")" } },
                                h('div', { className: "absolute top-0 left-0 w-full h-full opacity-10" },
                                    h('svg', { width: "100%", height: "100%", viewBox: "0 0 100 100", preserveAspectRatio: "none" },
                                        h('path', { d: "M0,0 L100,0 L100,20 Q50,40 0,20 Z", fill: "white" }),
                                        h('circle', { cx: "90", cy: "10", r: "15", fill: "white" })
                                    )
                                ),
                                h('div', { className: "relative z-10 space-y-6" },
                                    h('div', { className: "flex justify-center mb-2" },
                                        h('div', { className: "px-3 py-1 bg-white bg-opacity-20 text-white text-[8px] tracking-[0.5em] uppercase font-bold border border-white border-opacity-30 rounded-sm" }, "Archetype No. " + Math.floor(Math.random() * 10000))
                                    ),
                                    h('h2', { className: "text-5xl md:text-6xl font-bold text-white tracking-[0.2em] text-center" }, result.name),
                                    h('div', { className: "space-y-4" },
                                        h('p', { className: "text-sm text-white italic font-light tracking-[0.5em] opacity-90 text-center" }, result.sub),
                                        h('div', { className: "flex justify-center gap-3" },
                                            h('span', { className: "px-4 py-1.5 bg-white text-[10px] font-bold uppercase tracking-widest rounded-full shadow-lg", style: { color: result.theme } }, "原型匹配度 98.7%")
                                        )
                                    )
                                )
                            ),
                            h('div', { className: "px-6 -mt-10 relative z-20" },
                                h('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-6 bg-white p-8 border border-[#dcd8cf] rounded-3xl shadow-2xl items-center mb-8" },
                                    h('div', { className: "space-y-4 text-left" },
                                        h('h4', { className: "text-[11px] font-bold border-b pb-2 text-[#3a3833] opacity-60 uppercase tracking-widest" }, "叙事基因分析 / ANALYSIS"),
                                        h('div', { className: "space-y-3 text-[10px]" },
                                            h('div', { className: "flex justify-between items-center text-gray-400 uppercase" },
                                                h('span', null, "批判逻辑"),
                                                h('div', { className: "w-24 h-1 bg-gray-100" }, h('div', { className: "h-full", style: { width: result.stats[0] + "%", backgroundColor: result.theme } }))
                                            ),
                                            h('div', { className: "flex justify-between items-center text-gray-400 uppercase" },
                                                h('span', null, "智性深度"),
                                                h('div', { className: "w-24 h-1 bg-gray-100" }, h('div', { className: "h-full", style: { width: result.stats[1] + "%", backgroundColor: result.theme } }))
                                            ),
                                            h('div', { className: "flex justify-between items-center text-gray-400 uppercase" },
                                                h('span', null, "审美强度"),
                                                h('div', { className: "w-24 h-1 bg-gray-100" }, h('div', { className: "h-full", style: { width: result.stats[2] + "%", backgroundColor: result.theme } }))
                                            )
                                        )
                                    ),
                                    h('div', { className: "aspect-square w-full max-w-[180px] mx-auto" }, h('canvas', { ref: radarCanvas }))
                                ),
                                h('div', { className: "p-10 bg-white border border-[#dcd8cf] rounded-3xl shadow-sm mb-8 space-y-6 relative overflow-hidden text-left" },
                                    h('div', { className: "flex items-center gap-3 border-b border-gray-50 pb-4" },
                                        h('span', { className: "text-[11px] font-bold uppercase tracking-[0.3em] text-[#3a3833] opacity-60" }, "文学史回响 / CONTEXT")
                                    ),
                                    h('p', { className: "text-[13px] text-[#6d6b64] leading-[2.2] text-justify tracking-wide italic" }, result.bio)
                                ),
                                h('div', { className: "relative p-10 bg-white border border-[#dcd8cf] text-center rounded-3xl shadow-sm mb-8" },
                                    h('p', { className: "text-xl md:text-2xl leading-[1.8] font-medium italic mb-6 text-center" }, h('span', { className: "highlight-yellow" }, "“" + result.quote + "”")),
                                    h('div', { className: "text-[10px] text-[#a4c29b] tracking-widest uppercase font-bold text-center" }, "— " + result.name + " —")
                                ),
                                h('div', { className: "space-y-12 px-2 text-left" },
                                    h('section', { className: "space-y-4" },
                                        h('h4', { className: "text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-[#3a3833] opacity-60" }, "精神原色 / THE SELF"),
                                        h('div', { className: "bg-white p-8 border-l-4 space-y-6", style: { borderColor: result.theme } },
                                            h('p', { className: "text-[14px] leading-relaxed text-[#6d6b64] italic" }, "“" + result.identity + "”"),
                                            h('p', { className: "text-[14px] leading-relaxed font-light" }, result.longDesc)
                                        )
                                    ),
                                    h('section', { className: "space-y-4 text-left" },
                                        h('h4', { className: "text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-[#3a3833] opacity-60" }, "精神母题与当代图景 / MOTIF & ECHO"),
                                        h('div', { className: "grid grid-cols-1 gap-6 text-[13px]" },
                                            h('div', { className: "p-6 bg-gray-50 border border-gray-100 rounded text-left" },
                                                h('div', { className: "font-bold mb-2 opacity-60 uppercase text-[10px]" }, "灵魂叙事母题"),
                                                h('div', { className: "opacity-80 leading-relaxed italic" }, result.motif)
                                            ),
                                            h('div', { className: "p-6 bg-blue-50 bg-opacity-30 border border-blue-100 rounded text-left" },
                                                h('div', { className: "font-bold mb-2 opacity-60 uppercase text-[10px]" }, "当代生活样本"),
                                                h('div', { className: "opacity-80 leading-relaxed" }, result.echo)
                                            )
                                        )
                                    ),
                                    h('section', { className: "space-y-4 text-left" },
                                        h('h4', { className: "text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-red-800 opacity-60" }, "核心焦虑与盲区"),
                                        h('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-4 text-[13px]" },
                                            h('div', { className: "p-6 bg-red-50 border border-red-100 rounded text-left" },
                                                h('div', { className: "font-bold mb-2 opacity-60 uppercase text-[10px]" }, "主导焦虑"),
                                                h('div', { className: "opacity-80 text-red-900" }, result.anxiety)
                                            ),
                                            h('div', { className: "p-6 bg-gray-50 border border-gray-100 rounded text-left" },
                                                h('div', { className: "font-bold mb-2 opacity-60 uppercase text-[10px]" }, "阴影面"),
                                                h('div', { className: "opacity-70" }, result.shadow)
                                            )
                                        )
                                    ),
                                    h('section', { className: "space-y-6 text-left" },
                                        h('h4', { className: "text-[11px] font-bold uppercase tracking-[0.5em] border-b border-[#dcd8cf] pb-2 text-[#3a3833] opacity-60" }, "灵魂处方 / PRESCRIPTION"),
                                        h('div', { className: "grid gap-4" },
                                            result.books.map((book, i) => 
                                                h('div', { key: i, className: "bg-white p-6 border border-[#dcd8cf] rounded-xl shadow-sm text-left" },
                                                    h('h5', { className: "text-[16px] font-bold mb-1" }, book.title),
                                                    h('p', { className: "text-[10px] text-[#a4c29b] font-bold mb-3 uppercase" }, "作者: " + book.author),
                                                    h('p', { className: "text-[13px] text-[#6d6b64] italic leading-relaxed opacity-80" }, book.desc)
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                        ),
                        h('div', { className: "pt-8 space-y-4 text-center px-4" },
                            h('button', { onClick: saveAsImage, disabled: isSaving, className: "w-full py-6 bg-black text-white text-[11px] font-bold uppercase tracking-[0.6em] shadow-2xl active:scale-95 transition-all rounded-2xl" }, isSaving ? "正在生成中..." : "保存手稿报告 / SAVE REPORT"),
                            h('button', { onClick: handleRestart, className: "w-full py-6 border border-[#3a3833] text-[#3a3833] text-[11px] font-bold uppercase tracking-[0.6em] hover:bg-[#3a3833] hover:text-white transition-all rounded-2xl" },
                                h('span', null, " 再次校准原型")
                            )
                        )
                    ),
                    h('footer', { className: "mt-16 pt-16 border-t border-[#dcd8cf] text-center space-y-4" },
                        h('p', { className: "text-[10px] tracking-[0.6em] uppercase text-[#3a3833] font-bold opacity-60" }, "© 2026 CURATED BY @云树CLOUDTREE")
                    )
                );
            }
            return null;
        }

        window.addEventListener('DOMContentLoaded', () => {
            try {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(h(App));
            } catch (err) {
                console.error("Render failed:", err);
                document.body.innerHTML = '<div style="padding:40px; text-align:center; font-family:sans-serif;">系统初始化失败，请尝试刷新页面。</div>';
            }
        });
    </script>
</body>
</html>
