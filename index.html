                    { text: "温柔地在向往。相信这繁华落尽后，总还有点什么东西值得我守着。", target: "曹雪芹" },
                    { text: "平和地在迈步。不慌不忙、顺其自然，未来就在这些扎实的脚印里。", target: "史铁生" }
                ]
            },
            { 
                id: 27, 
                text: "你最容易被打动的瞬间，更贴合：", 
                origin: "颤动的灵光", 
                desc: "那些微小的、不合时宜的震颤，才是真正的生命线索。", 
                reading: "《边城》",
                annotation: "感动的瞬间即是灵魂共鸣的坐标。",
                options: [
                    { text: "在那弱小的身躯里，突然爆发出的、敢于直面这个烂现实的孤勇。", target: "萧红" },
                    { text: "在众人的愚昧中，突然看到那一双清醒、通透，还能自嘲的眼睛。", target: "钱钟书" },
                    { text: "在荒凉的废墟上，那一抹不经意间露出来的、没人发现的纯粹善意。", target: "沈从文" },
                    { text: "在极度的苦难后，那双依然能看清生活的本真、还能拉人一把的手。", target: "余华" }
                ]
            },
            { 
                id: 28, 
                text: "你对「合群」的看法，更贴合：", 
                origin: "边界的守护", 
                desc: "合群是对自我的稀释，还是对孤独的收留？", 
                reading: "《沉默的大多数》",
                annotation: "你对待群体的态度，反映了你精神主权的大小。",
                options: [
                    { text: "不凑那个热闹。清醒地待在边缘处，别让那帮俗人的气味熏坏了脑子。", target: "鲁迅" },
                    { text: "选对那个圈子。只跟懂的人交心，不懂的人连招呼都懒得打，费脑细胞。", target: "王小波" },
                    { text: "无声地待在旁边。在烟火里不迎合也不讨好，守着自己那点小确幸。", target: "周作人" },
                    { text: "平和地融进去。既然大家都这么活，我就在平凡里陪大家走一段。", target: "老舍" }
                ]
            },
            { 
                id: 29, 
                text: "如果可以，你想活成的文学意象，更贴合：", 
                origin: "灵魂的物化", 
                desc: "如果灵魂可以被铸造，你更愿意成为什么样的容器？", 
                reading: "《野草》",
                annotation: "意象是你精神终极形态的白日梦。",
                options: [
                    { text: "一把冷冽的钢刀。直接刺向这惨淡的现实，想唤醒那些睡死的人。", target: "鲁迅" },
                    { text: "一座精致的迷宫。让那些脑筋不清楚的人在那儿兜圈子，我自清醒。", target: "钱钟书" },
                    { text: "一朵开在河边的花。不管外面怎么乱，我只管守住这点温柔和纯粹。", target: "沈从文" },
                    { text: "一条延伸到天边的路。让苦难和磨砺都踩在脚下，最后通向安静。", target: "史铁生" }
                ]
            },
            { 
                id: 30, 
                text: "最后，你认为的「人生至味」，更贴合：", 
                origin: "最后的归途", 
                desc: "洗净铅华后，你最想在那页白纸上写下哪个词？", 
                reading: "《我们仨》",
                annotation: "一切博弈的终点，即是归处。",
                options: [
                    { text: "清醒。哪怕这一辈子都在孤独里反抗，起码我没糊里糊涂地过。", target: "鲁迅" },
                    { text: "通透。看清了世界的底牌，还能在那儿笑嘻嘻地玩这场荒唐游戏。", target: "钱钟书" },
                    { text: "诗意。在最琐碎、最平常的烟火里，感受到了人间的那点真性情。", target: "汪曾祺" },
                    { text: "自洽。在思考和行走里认领了所有的苦，最后活成了一个踏实的圆。", target: "史铁生" }
                ]
            }
        ];

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [scores, setScores] = useState({});
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [showAnnotation, setShowAnnotation] = useState(false);
            const [code, setCode] = useState("");
            
            const radarCanvas = useRef(null);
            const captureRef = useRef(null);
            const chartRef = useRef(null);

            const handleVerify = () => {
                if (code.toLowerCase().trim() === "qwert") setStep('quiz');
                else { /* 可添加错误提示 */ }
            };

            const handleAnswer = (target) => {
                const newScores = { ...scores, [target]: (scores[target] || 0) + 1 };
                setHistory([...history, { scores, currentQuestion }]);
                setScores(newScores);
                setShowAnnotation(false);
                if (currentQuestion < QUESTIONS.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    const maxScore = Math.max(...Object.values(newScores));
                    const candidates = Object.keys(newScores).filter(name => (newScores[name] || 0) === maxScore);
                    const topWriterName = candidates[Math.floor(Math.random() * candidates.length)] || "鲁迅";
                    setResult(Object.assign({}, WRITER_DATA[topWriterName], { name: topWriterName }));
                    setStep('result');
                    window.scrollTo(0, 0);
                }
            };

            const handleBack = () => {
                if (history.length > 0) {
                    const last = history[history.length - 1];
                    setScores(last.scores); setCurrentQuestion(last.currentQuestion);
                    setHistory(history.slice(0, -1));
                    setShowAnnotation(false);
                } else setStep('welcome');
            };

            const handleRestart = () => {
                setStep('welcome'); setCurrentQuestion(0); setScores({}); setHistory([]); setResult(null); setCode("");
                window.scrollTo(0, 0);
            };

            const saveAsImage = async () => {
                if (typeof html2canvas === 'undefined') return;
                setIsSaving(true);
                try {
                    const canvas = await html2canvas(captureRef.current, { scale: 3, backgroundColor: "#f2f0e9", useCORS: true });
                    const link = document.createElement('a');
                    link.download = `灵魂手稿-${result.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (err) { console.error(err); }
                setIsSaving(false);
            };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = radarCanvas.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['批判逻辑', '智性深度', '审美强度', '自由意志', '精神韧性'],
                            datasets: [{ data: result.stats, backgroundColor: result.theme + "22", borderColor: result.theme, borderWidth: 2, pointRadius: 0 }]
                        },
                        options: { scales: { r: { angleLines: { display: false }, grid: { color: 'rgba(0,0,0,0.05)' }, pointLabels: { font: { size: 9, family: 'Noto Serif SC', weight: 'bold' } }, ticks: { display: false }, min: 0, max: 100 } }, plugins: { legend: { display: false } } }
                    });
                }
            }, [step, result]);

            if (step === 'welcome') {
                return h('div', { className: "max-w-xl mx-auto px-6 py-12 animate-fade-in" },
                    h('div', { className: "text-center space-y-12" },
                        h('div', { className: "flex justify-between items-start" },
                            h('div', { className: "tag-black" }, "ARCHETYPE ARCHIVE"),
                            h('div', { className: "text-[8px] opacity-30 font-bold tracking-widest" }, "NO. 2026 / SYSTEM 01")
                        ),
                        h('div', { className: "text-left py-8 border-b-2 border-[#3a3833]" },
                            h('h1', { className: "text-5xl font-black tracking-[0.1em] text-[#3a3833]" }, "认领你的", h('br'), h('span', { className: "highlight-yellow" }, "文学原型")),
                            h('p', { className: "mt-6 text-[10px] text-gray-400 tracking-[0.4em] uppercase font-bold" }, "LITERARY NARRATIVE SYSTEM")
                        ),
                        h('div', { className: "space-y-10 pt-8" },
                            h('div', { className: "flex flex-col items-center gap-4" },
                                h('span', { className: "text-[10px] uppercase tracking-[0.3em] opacity-40 font-bold" }, "通行码验证 / ACCESS CODE"),
                                h('input', { type: "text", value: code, onChange: (e) => setCode(e.target.value), className: "redeem-input w-48 py-2 text-center text-sm", placeholder: "请输入通行码解锁测试" })
                            ),
                            h('button', { onClick: handleVerify, className: "w-full py-8 bg-[#3a3833] text-white text-[14px] tracking-[0.8em] font-bold shadow-2xl active:scale-95 transition-all" }, "开启漫游 / ENTER"),
                            h('div', { className: "text-[10px] text-gray-400 tracking-[0.4em]" }, "© 2026 CURATED BY @云树CLOUDTREE")
                        )
                    )
                );
            }

            if (step === 'quiz') {
                const q = QUESTIONS[currentQuestion];
                return h('div', { className: "max-w-xl mx-auto px-6 py-12 animate-fade-in" },
                    h('div', { className: "space-y-8" },
                        h('div', { className: "flex justify-between items-center text-[10px] opacity-40 font-bold tracking-widest" },
                            h('button', { onClick: handleBack }, "BACK"),
                            h('span', null, "DECISION " + (currentQuestion + 1) + " / 30")
                        ),
                        h('div', { className: "context-box" },
                            h('div', { className: "flex items-center gap-4 mb-4" },
                                h('span', { className: "tag-black" }, "叙事背景"),
                                h('span', { className: "text-xs font-bold opacity-80" }, q.origin)
                            ),
                            h('p', { className: "text-xs leading-relaxed opacity-60 italic mb-4" }, q.desc),
                            h('div', { className: "flex items-center gap-4" },
                                h('span', { className: "tag-outline" }, "扩展阅读"),
                                h('span', { className: "text-[10px] opacity-40" }, q.reading)
                            )
                        ),
                        h('h2', { className: "text-[22px] leading-[1.6] font-medium text-[#3a3833] mb-10" }, q.text),
                        h('div', { className: "space-y-2" },
                            q.options.map((opt, i) => 
                                h('button', { key: i, onClick: () => handleAnswer(opt.target), className: "option-btn text-sm leading-relaxed" }, opt.text)
                            )
                        ),
                        h('div', { className: "pt-8" },
                            h('button', { 
                                onClick: () => setShowAnnotation(!showAnnotation), 
                                className: "text-[11px] font-bold opacity-40 flex items-center gap-1 hover:opacity-100 transition-all" 
                            }, showAnnotation ? "收起注解 ︿" : "展开注解 ﹀"),
                            showAnnotation && h('div', { className: "mt-4 text-xs leading-[2] text-[#6d6b64] italic animate-fade-in border-t border-[#dcd8cf] pt-4" }, q.annotation)
                        )
                    )
                );
            }

            if (step === 'result' && result) {
                return h('div', { className: "max-w-xl mx-auto px-4 py-8 animate-fade-in" },
                    h('div', { ref: captureRef, className: "pb-12 bg-[#f2f0e9] overflow-hidden rounded-2xl result-card relative" },
                        h('div', { className: "p-12 text-center relative overflow-hidden", style: { background: "linear-gradient(135deg, " + result.theme + ", " + result.secondary + ")" } },
                            h('div', { className: "relative z-10 space-y-4" },
                                h('div', { className: "px-3 py-1 mx-auto bg-white bg-opacity-20 text-white text-[8px] tracking-[0.5em] uppercase font-bold border border-white border-opacity-30 w-fit" }, "Archetype No. " + Math.floor(Math.random() * 9000 + 1000)),
                                h('h2', { className: "text-6xl font-bold text-white tracking-[0.2em]" }, result.name),
                                h('p', { className: "text-sm text-white italic font-light tracking-[0.5em] opacity-90" }, result.sub)
                            )
                        ),
                        h('div', { className: "px-8 -mt-8 relative z-20" },
                            h('div', { className: "grid grid-cols-1 md:grid-cols-2 gap-8 bg-white p-10 rounded-3xl shadow-2xl items-center mb-8" },
                                h('div', { className: "space-y-4" },
                                    h('h4', { className: "text-[11px] font-bold border-b pb-2 text-[#3a3833] opacity-60 tracking-widest" }, "叙事基因分析 / ANALYSIS"),
                                    h('div', { className: "space-y-4 text-[10px] text-gray-400" },
                                        ['批判逻辑', '智性深度', '审美强度'].map((label, idx) => h('div', { key: label, className: "flex justify-between items-center" }, 
                                            h('span', null, label), 
                                            h('div', { className: "w-24 h-1 bg-gray-100" }, h('div', { className: "h-full", style: { width: result.stats[idx] + "%", backgroundColor: result.theme } }))
                                        ))
                                    )
                                ),
                                h('div', { className: "aspect-square w-full max-w-[200px] mx-auto" }, h('canvas', { ref: radarCanvas }))
                            ),
                            h('div', { className: "p-8 bg-white rounded-3xl shadow-sm space-y-6" },
                                h('h4', { className: "text-[11px] font-bold opacity-40 tracking-[0.5em]" }, "精神坐标 / IDENTITY"),
                                h('p', { className: "text-[15px] leading-relaxed italic text-[#3a3833] border-l-4 pl-4", style: { borderColor: result.theme } }, result.identity),
                                h('p', { className: "text-[13px] leading-[1.8] text-[#6d6b64]" }, result.bio)
                            )
                        )
                    ),
                    h('div', { className: "mt-8 space-y-4 px-4" },
                        h('button', { onClick: saveAsImage, disabled: isSaving, className: "w-full py-6 bg-black text-white text-[12px] font-bold uppercase tracking-[0.6em] rounded-2xl" }, isSaving ? "生成中..." : "保存手稿报告 / SAVE REPORT"),
                        h('button', { onClick: handleRestart, className: "w-full py-6 border border-[#3a3833] text-[#3a3833] text-[12px] font-bold uppercase tracking-[0.6em] rounded-2xl" }, "重新认领原型")
                    )
                );
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(App));
    </script>
</body>
</html>
